<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<title>PacketPath — CompTIA Network+ Trainer</title>

<!-- iOS PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PacketPath">
<meta name="theme-color" content="#0E1420">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%230E1420'/%3E%3Cg fill='none' stroke='%2338BDF8' stroke-width='7' stroke-linecap='round'%3E%3Cpath d='M40 90 H140'/%3E%3Ccircle cx='40' cy='90' r='13' fill='%2334D399' stroke='none'/%3E%3Ccircle cx='90' cy='90' r='13' fill='%23A78BFA' stroke='none'/%3E%3Ccircle cx='140' cy='90' r='13' fill='%23FBBF24' stroke='none'/%3E%3Cpath d='M90 90 V45 M90 90 V135' stroke='%232A3650'/%3E%3C/g%3E%3C/svg%3E">

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230E1420'/%3E%3Ccircle cx='8' cy='16' r='3' fill='%2334D399'/%3E%3Ccircle cx='16' cy='16' r='3' fill='%23A78BFA'/%3E%3Ccircle cx='24' cy='16' r='3' fill='%23FBBF24'/%3E%3Cpath d='M8 16h16' stroke='%2338BDF8' stroke-width='1.5'/%3E%3C/svg%3E">

<style>
  :root{
    --bg:#0E1420; --panel:#161E2E; --raised:#1E283B; --line:#2A3650; --line-soft:#202b40;
    --txt:#E8EDF6; --muted:#8B97AD; --dim:#5c6880;
    --green:#34D399; --cyan:#38BDF8; --amber:#FBBF24; --red:#F87171; --violet:#A78BFA;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif;
    --safe-t:env(safe-area-inset-top); --safe-b:env(safe-area-inset-bottom);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:var(--bg); color:var(--txt); font-family:var(--sans);
    -webkit-font-smoothing:antialiased; overflow-x:hidden; line-height:1.5;
    background-image:radial-gradient(circle at 85% -10%, #1a2740 0%, transparent 45%),
                     radial-gradient(circle at 0% 100%, #16223a 0%, transparent 40%);
  }
  ::selection{background:var(--cyan);color:#06121f}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  .app{max-width:560px;margin:0 auto;min-height:100%;display:flex;flex-direction:column}

  /* ---- status bar header ---- */
  header{
    position:sticky;top:0;z-index:40;background:rgba(14,20,32,.86);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border-bottom:1px solid var(--line); padding-top:var(--safe-t);
  }
  .bar{display:flex;align-items:center;gap:10px;padding:11px 16px}
  .logo{display:flex;align-items:center;gap:9px;font-family:var(--mono);font-weight:600;letter-spacing:-.3px}
  .logo .dots{display:flex;gap:4px}
  .logo .dots i{width:8px;height:8px;border-radius:50%;display:block}
  .logo .dots i:nth-child(1){background:var(--green)}
  .logo .dots i:nth-child(2){background:var(--violet)}
  .logo .dots i:nth-child(3){background:var(--amber)}
  .logo b{font-size:15px;color:var(--txt)}
  .logo b span{color:var(--cyan)}
  .bar .spacer{flex:1}
  .pill{font-family:var(--mono);font-size:11px;color:var(--muted);border:1px solid var(--line);
        padding:4px 9px;border-radius:20px;display:flex;align-items:center;gap:6px;background:var(--panel)}
  .pill .live{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 7px var(--green)}
  .backbtn{font-family:var(--mono);font-size:13px;color:var(--cyan);display:flex;align-items:center;gap:5px;padding:4px 4px}
  .backbtn svg{width:14px;height:14px}

  main{flex:1;padding:18px 16px calc(34px + var(--safe-b))}

  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);margin-bottom:8px}
  h1{font-size:26px;font-weight:700;letter-spacing:-.6px;line-height:1.15}
  h1 em{font-style:normal;color:var(--cyan)}
  .sub{color:var(--muted);font-size:14px;margin-top:6px}

  /* ---- progress hero ---- */
  .hero{margin:20px 0 8px;display:flex;gap:16px;align-items:center;
        background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px}
  .ring{position:relative;width:78px;height:78px;flex:none}
  .ring svg{transform:rotate(-90deg)}
  .ring .pct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .ring .pct b{font-family:var(--mono);font-size:19px;font-weight:600}
  .ring .pct small{font-size:9px;color:var(--dim);letter-spacing:.5px}
  .hero-meta{flex:1}
  .hero-meta .t{font-size:13px;color:var(--muted)}
  .hero-meta .v{font-family:var(--mono);font-size:15px;margin-top:2px}
  .statline{display:flex;gap:14px;margin-top:10px;flex-wrap:wrap}
  .statline div{font-family:var(--mono);font-size:11px;color:var(--muted)}
  .statline div b{color:var(--txt);font-weight:600}
  .statline .g b{color:var(--green)} .statline .a b{color:var(--amber)}

  /* ---- mode buttons ---- */
  .modes{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0 6px}
  .mode{border:1px solid var(--line);border-radius:14px;padding:14px;text-align:left;background:var(--panel);
        transition:transform .12s,border-color .12s;position:relative;overflow:hidden}
  .mode:active{transform:scale(.975)}
  .mode .ico{width:30px;height:30px;margin-bottom:9px}
  .mode h3{font-size:15px;font-weight:650;letter-spacing:-.2px}
  .mode p{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.4}
  .mode.full{grid-column:1/3;display:flex;align-items:center;gap:14px}
  .mode.full .ico{margin:0}
  .mode.exam{border-color:#3a2f1a;background:linear-gradient(180deg,#1c1a12,#161e2e)}
  .mode.exam:active{border-color:var(--amber)}
  .mode.quick:active{border-color:var(--cyan)}
  .mode.review:active{border-color:var(--violet)}
  .mode .tag{position:absolute;top:11px;right:11px;font-family:var(--mono);font-size:9px;color:var(--dim)}

  .sectlabel{display:flex;align-items:center;gap:10px;margin:24px 0 12px}
  .sectlabel h2{font-size:13px;font-family:var(--mono);letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
  .sectlabel .ln{flex:1;height:1px;background:var(--line)}
  .sectlabel .ct{font-family:var(--mono);font-size:11px;color:var(--dim)}

  /* ---- topic rows (interface table) ---- */
  .topics{display:flex;flex-direction:column;gap:8px}
  .topic{display:flex;align-items:center;gap:13px;background:var(--panel);border:1px solid var(--line);
         border-radius:13px;padding:12px 14px;transition:transform .12s,border-color .12s;text-align:left;width:100%}
  .topic:active{transform:scale(.985);border-color:var(--cyan)}
  .code{font-family:var(--mono);font-size:12px;font-weight:600;width:42px;height:42px;flex:none;border-radius:10px;
        display:flex;align-items:center;justify-content:center;letter-spacing:.5px;border:1px solid var(--line)}
  .topic .info{flex:1;min-width:0}
  .topic .info .nm{font-size:14.5px;font-weight:600;letter-spacing:-.2px;display:flex;align-items:center;gap:7px}
  .topic .info .nm .exam{font-family:var(--mono);font-size:9px;color:var(--dim);font-weight:400;border:1px solid var(--line-soft);padding:1px 5px;border-radius:5px}
  .topic .info .meta{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:5px;display:flex;align-items:center;gap:8px}
  .mbar{height:4px;background:var(--line-soft);border-radius:3px;overflow:hidden;flex:1;max-width:90px}
  .mbar i{display:block;height:100%;border-radius:3px;background:var(--green);transition:width .4s}
  .chev{color:var(--dim);flex:none}
  .chev svg{width:16px;height:16px}

  /* ---- lesson ---- */
  .lesson .head{display:flex;align-items:center;gap:13px;margin-bottom:6px}
  .lesson .head .code{width:48px;height:48px;font-size:14px}
  .lesson .head h1{font-size:21px}
  .lesson .summary{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--cyan);
                   border-radius:0 12px 12px 0;padding:14px 16px;margin:16px 0;font-size:14.5px;color:#d4dcea}
  .keyhdr{font-family:var(--mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--violet);margin:20px 0 10px}
  ul.key{list-style:none;display:flex;flex-direction:column;gap:11px}
  ul.key li{display:flex;gap:11px;font-size:14px;color:#cdd6e6;line-height:1.5}
  ul.key li::before{content:"▸";color:var(--cyan);font-family:var(--mono);flex:none;margin-top:1px}
  ul.key li b{color:var(--txt)}
  code,.k{font-family:var(--mono);font-size:.88em;background:#10192b;border:1px solid var(--line-soft);
          padding:1px 6px;border-radius:5px;color:var(--cyan)}
  /* data table */
  .dtable{margin:18px 0;border:1px solid var(--line);border-radius:12px;overflow:hidden;font-family:var(--mono);font-size:12.5px}
  .dtable .row{display:flex;border-bottom:1px solid var(--line-soft)}
  .dtable .row:last-child{border-bottom:none}
  .dtable .row.h{background:var(--raised);color:var(--muted);font-size:10.5px;letter-spacing:.5px;text-transform:uppercase}
  .dtable .row > div{padding:9px 12px;flex:1}
  .dtable .row > div:first-child{flex:none;width:38%;color:var(--amber);border-right:1px solid var(--line-soft)}
  .dtable .row.h > div:first-child{color:var(--muted)}

  /* ---- OSI stack signature ---- */
  .osi{display:flex;flex-direction:column;gap:5px;margin:18px 0}
  .osi .lyr{display:flex;align-items:center;gap:12px;border-radius:9px;padding:11px 14px;border:1px solid var(--line);
            font-family:var(--mono);position:relative;overflow:hidden}
  .osi .lyr .n{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;
               font-size:11px;font-weight:600;flex:none;color:#06121f}
  .osi .lyr .nm{font-size:13px;font-weight:600;color:var(--txt)}
  .osi .lyr .ex{font-size:10.5px;color:var(--muted);margin-left:auto;text-align:right}
  .osi .lyr::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px}

  /* ---- quiz ---- */
  .qmeta{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .qprog{flex:1;height:6px;background:var(--line-soft);border-radius:4px;overflow:hidden}
  .qprog i{display:block;height:100%;background:linear-gradient(90deg,var(--cyan),var(--violet));transition:width .35s;border-radius:4px}
  .qcount{font-family:var(--mono);font-size:12px;color:var(--muted)}
  .qtimer{font-family:var(--mono);font-size:12px;color:var(--amber);display:flex;align-items:center;gap:5px}
  .qtag{font-family:var(--mono);font-size:10px;color:var(--dim);border:1px solid var(--line-soft);padding:2px 7px;border-radius:6px;margin-bottom:12px;display:inline-block}
  .qtext{font-size:18px;font-weight:600;line-height:1.4;letter-spacing:-.3px;margin-bottom:6px}
  .qtext .k{font-size:.82em}
  .opts{display:flex;flex-direction:column;gap:10px;margin-top:18px}
  .opt{display:flex;align-items:flex-start;gap:12px;border:1px solid var(--line);border-radius:13px;padding:14px;
       background:var(--panel);transition:border-color .15s,background .15s,transform .1s;text-align:left;width:100%;font-size:14.5px;line-height:1.45}
  .opt:active{transform:scale(.99)}
  .opt .ltr{font-family:var(--mono);font-size:13px;font-weight:600;width:24px;height:24px;border-radius:7px;
            border:1px solid var(--line);display:flex;align-items:center;justify-content:center;flex:none;color:var(--muted)}
  .opt.sel{border-color:var(--cyan)}
  .opt.sel .ltr{background:var(--cyan);color:#06121f;border-color:var(--cyan)}
  .opt.correct{border-color:var(--green);background:rgba(52,211,153,.08)}
  .opt.correct .ltr{background:var(--green);color:#06121f;border-color:var(--green)}
  .opt.wrong{border-color:var(--red);background:rgba(248,113,113,.08)}
  .opt.wrong .ltr{background:var(--red);color:#06121f;border-color:var(--red)}
  .opt[disabled]{cursor:default}
  .opt .res{margin-left:auto;flex:none}
  .opt .res svg{width:18px;height:18px}

  .exp{margin-top:16px;border-radius:12px;padding:14px 16px;font-size:13.5px;line-height:1.55;
       border:1px solid var(--line);background:var(--raised);display:none}
  .exp.show{display:block;animation:fade .25s ease}
  .exp .lbl{font-family:var(--mono);font-size:10.5px;letter-spacing:1px;text-transform:uppercase;margin-bottom:7px;display:flex;align-items:center;gap:7px}
  .exp.good .lbl{color:var(--green)} .exp.bad .lbl{color:var(--red)}
  .exp p{color:#cdd6e6}
  @keyframes fade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

  /* ---- buttons ---- */
  .actions{margin-top:22px;display:flex;gap:10px}
  .btn{flex:1;border-radius:13px;padding:15px;font-size:15px;font-weight:650;letter-spacing:-.2px;
       transition:transform .1s,opacity .15s;text-align:center}
  .btn:active{transform:scale(.98)}
  .btn.primary{background:var(--cyan);color:#06121f}
  .btn.amber{background:var(--amber);color:#1a1305}
  .btn.violet{background:var(--violet);color:#120a26}
  .btn.ghost{background:var(--panel);border:1px solid var(--line);color:var(--txt)}
  .btn[disabled]{opacity:.4;pointer-events:none}

  /* ---- results ---- */
  .scorebig{text-align:center;margin:10px 0 6px}
  .scorebig .pctn{font-family:var(--mono);font-size:64px;font-weight:700;line-height:1;letter-spacing:-2px}
  .scorebig .verdict{font-size:16px;font-weight:600;margin-top:8px}
  .scorebig .detail{font-family:var(--mono);font-size:13px;color:var(--muted);margin-top:6px}
  .pass{color:var(--green)} .near{color:var(--amber)} .fail{color:var(--red)}
  .reviewlist{margin-top:22px;display:flex;flex-direction:column;gap:12px}
  .rev{border:1px solid var(--line);border-radius:12px;padding:14px;background:var(--panel)}
  .rev .q{font-size:14px;font-weight:600;line-height:1.4;margin-bottom:10px}
  .rev .ln{font-family:var(--mono);font-size:12.5px;display:flex;gap:8px;align-items:flex-start;margin-top:5px;line-height:1.4}
  .rev .ln .tg{flex:none;font-weight:600}
  .rev .yours{color:var(--red)} .rev .right{color:var(--green)}
  .rev .ex{font-size:12.5px;color:var(--muted);margin-top:10px;padding-top:10px;border-top:1px solid var(--line-soft);line-height:1.5}

  footer{text-align:center;font-family:var(--mono);font-size:10.5px;color:var(--dim);
         padding:22px 16px calc(20px + var(--safe-b));border-top:1px solid var(--line-soft);margin-top:30px}
  footer span{color:var(--green)}

  .mode.flash:active{border-color:var(--green)}
  .mode.subnet:active{border-color:var(--cyan)}

  /* ---- segmented tabs ---- */
  .tabs{display:flex;gap:4px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:4px;margin:6px 0 18px}
  .tabs button{flex:1;font-family:var(--mono);font-size:12.5px;font-weight:600;letter-spacing:.3px;
               padding:9px;border-radius:9px;color:var(--muted);transition:background .15s,color .15s}
  .tabs button.on{background:var(--raised);color:var(--txt)}

  /* ---- flashcards ---- */
  .chips{display:flex;gap:7px;overflow-x:auto;padding:2px 0 14px;-webkit-overflow-scrolling:touch}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:none;font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.4px;padding:7px 12px;
        border-radius:20px;border:1px solid var(--line);color:var(--muted);background:var(--panel);transition:all .15s}
  .chip.on{color:#06121f}
  .fcwrap{perspective:1400px;margin:6px 0 4px}
  .fcard{position:relative;width:100%;min-height:300px;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,.2,.2,1);cursor:pointer}
  .fcard.flip{transform:rotateY(180deg)}
  .fcface{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
          border:1px solid var(--line);border-radius:20px;padding:26px 22px;display:flex;flex-direction:column;
          align-items:center;justify-content:center;text-align:center;background:var(--panel)}
  .fcface .cat{position:absolute;top:16px;left:16px;font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.5px}
  .fcface .hint{position:absolute;bottom:16px;font-family:var(--mono);font-size:10.5px;color:var(--dim);letter-spacing:.5px}
  .fcface .lbl2{font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);margin-bottom:14px}
  .fcface .front-t{font-size:20px;font-weight:650;line-height:1.35;letter-spacing:-.3px}
  .fcback{transform:rotateY(180deg);background:var(--raised)}
  .fcback .answer{font-size:22px;font-weight:700;line-height:1.3;letter-spacing:-.4px;color:var(--green)}
  .fcback .detail2{font-size:13.5px;color:#c2cce0;margin-top:14px;line-height:1.5}
  .fcbtns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}
  .fcdone .big2{text-align:center;font-family:var(--mono);font-size:46px;font-weight:700;letter-spacing:-2px;margin:8px 0}

  /* ---- subnet calculator ---- */
  .sninput{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px}
  .sninput label{font-family:var(--mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--dim);display:block;margin-bottom:9px}
  .ipfield{display:flex;align-items:center;gap:6px;font-family:var(--mono)}
  .ipfield input.oct{width:100%;text-align:center;background:#0d1626;border:1px solid var(--line);border-radius:9px;
                      padding:13px 4px;font-family:var(--mono);font-size:17px;font-weight:600;color:var(--txt);min-width:0}
  .ipfield input.oct:focus{outline:none;border-color:var(--cyan)}
  .ipfield .dot{color:var(--dim);font-size:18px;font-weight:700}
  .ipfield .slash{color:var(--cyan);font-size:18px;font-weight:700;margin:0 2px}
  .ipfield input.cidr{width:62px;text-align:center;background:#0d1626;border:1px solid var(--cyan);border-radius:9px;
                       padding:13px 4px;font-family:var(--mono);font-size:17px;font-weight:600;color:var(--cyan)}
  .ipfield input.cidr:focus{outline:none}
  .cidrslide{margin-top:14px;display:flex;align-items:center;gap:12px}
  .cidrslide input[type=range]{flex:1;-webkit-appearance:none;height:5px;border-radius:4px;background:var(--line);outline:none}
  .cidrslide input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;
       background:var(--cyan);border:3px solid #0d1626;box-shadow:0 0 0 1px var(--cyan)}
  .cidrslide .cv{font-family:var(--mono);font-size:13px;color:var(--cyan);font-weight:600;width:34px;text-align:right}

  .snout{border:1px solid var(--line);border-radius:14px;overflow:hidden;font-family:var(--mono)}
  .snout .r{display:flex;border-bottom:1px solid var(--line-soft);font-size:13.5px}
  .snout .r:last-child{border-bottom:none}
  .snout .r .lab{width:46%;flex:none;padding:13px 14px;color:var(--muted);font-size:11.5px;letter-spacing:.3px;
                 text-transform:uppercase;background:#121a2b;border-right:1px solid var(--line-soft);display:flex;align-items:center}
  .snout .r .val{padding:13px 14px;font-weight:600;display:flex;align-items:center;word-break:break-all}
  .snout .r .val.net{color:var(--green)} .snout .r .val.bc{color:var(--red)}
  .snout .r .val.host{color:var(--cyan)} .snout .r .val.mask{color:var(--amber)}
  .snnote{font-family:var(--mono);font-size:11px;color:var(--dim);text-align:center;margin-top:12px;line-height:1.5}
  .snerr{color:var(--red)!important}
  .binrow{font-family:var(--mono);font-size:11px;color:var(--muted);text-align:center;margin-top:14px;
          background:#0d1626;border:1px solid var(--line-soft);border-radius:10px;padding:11px;word-break:break-all;line-height:1.7}
  .binrow .nbits{color:var(--green)} .binrow .hbits{color:var(--cyan)}

  /* ---- subnet drill ---- */
  .drillscore{display:flex;gap:10px;margin-bottom:16px}

  .drillscore .streak b{color:var(--amber)} .drillscore .acc b{color:var(--cyan)} .drillscore .best b{color:var(--green)}
  .drillq{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px;text-align:center;margin-bottom:16px}
  .drillq .given{font-family:var(--mono);font-size:24px;font-weight:700;letter-spacing:-.5px;color:var(--txt)}

  .drillq .ask{font-size:15px;color:var(--muted);margin-top:12px;line-height:1.4}
  .drillq .ask b{color:var(--violet)}
  .drillin{width:100%;background:#0d1626;border:1px solid var(--line);border-radius:13px;padding:15px;
           font-family:var(--mono);font-size:18px;font-weight:600;color:var(--txt);text-align:center}
  .drillin:focus{outline:none;border-color:var(--cyan)}
  .drillin.right{border-color:var(--green);color:var(--green)}
  .drillin.wrong{border-color:var(--red);color:var(--red)}
  .drillfb{margin-top:16px;border-radius:12px;border:1px solid var(--line);background:var(--raised);padding:15px;display:none}
  .drillfb.show{display:block;animation:fade .25s ease}
  .drillfb .v{font-family:var(--mono);font-size:13px;display:flex;align-items:center;gap:8px;margin-bottom:8px;font-weight:600}
  .drillfb.good .v{color:var(--green)} .drillfb.bad .v{color:var(--red)}
  .drillfb .work{font-family:var(--mono);font-size:12px;color:#c2cce0;line-height:1.7}
  .drillfb .work .k2{color:var(--amber)}

  .hidden{display:none!important}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}
    .fcard{transition:none}}

const TOPICS = [
{id:"osi",code:"OSI",color:"#A78BFA",name:"OSI & TCP/IP Models",exam:"Network+ (N10-009)",summary:"The OSI model is a 7-layer conceptual framework for how data moves across a network. The TCP/IP model collapses it into 4 practical layers. Almost every other networking topic maps back to one of these layers.",key:["<b>Mnemonic (L1→L7):</b> <i>Please Do Not Throw Sausage Pizza Away</i> — Physical, Data Link, Network, Transport, Session, Presentation, Application.","<b>Encapsulation</b> adds headers going down the stack; the resulting unit is called a PDU: <span class='k'>bits</span> → <span class='k'>frames</span> → <span class='k'>packets</span> → <span class='k'>segments</span> → data.","<b>Layer 2</b> uses MAC addresses (switches); <b>Layer 3</b> uses IP addresses (routers); <b>Layer 4</b> uses port numbers (TCP/UDP).","<b>TCP/IP 4-layer:</b> Network Access (=L1/L2), Internet (=L3), Transport (=L4), Application (=L5/6/7)."],osi:[{"n":7,"nm":"Application","ex":"HTTP, DNS, SMTP","c":"#A78BFA"},{"n":6,"nm":"Presentation","ex":"TLS, encoding, JPEG","c":"#8b7ae0"},{"n":5,"nm":"Session","ex":"RPC, NetBIOS","c":"#6f8de0"},{"n":4,"nm":"Transport","ex":"TCP / UDP, ports","c":"#38BDF8"},{"n":3,"nm":"Network","ex":"IP, ICMP, routers","c":"#34D399"},{"n":2,"nm":"Data Link","ex":"MAC, switches, ARP","c":"#fbbf24"},{"n":1,"nm":"Physical","ex":"cables, signals, hubs","c":"#f87171"}],q:[{"q":"At which OSI layer do switches primarily operate, forwarding traffic based on MAC addresses?","o":["Layer 1 – Physical","Layer 2 – Data Link","Layer 3 – Network","Layer 4 – Transport"],"a":1,"e":"Switches make forwarding decisions using MAC addresses, which live in the Layer 2 (Data Link) frame header. Routers operate at Layer 3 using IP addresses."},{"q":"What is the correct order of the OSI layers from Layer 1 to Layer 7?","o":["Physical, Network, Data Link, Transport, Session, Presentation, Application","Physical, Data Link, Network, Transport, Session, Presentation, Application","Application, Presentation, Session, Transport, Network, Data Link, Physical","Physical, Data Link, Transport, Network, Session, Application, Presentation"],"a":1,"e":"Bottom-up: Physical, Data Link, Network, Transport, Session, Presentation, Application — 'Please Do Not Throw Sausage Pizza Away.'"},{"q":"A unit of data at the Transport layer (Layer 4) using TCP is called a:","o":["Frame","Packet","Segment","Bit"],"a":2,"e":"PDUs by layer: bits (L1), frames (L2), packets (L3), and segments (L4 TCP). UDP at L4 uses datagrams."},{"q":"Which OSI layer is responsible for encryption, such as TLS handling, and data format translation?","o":["Session","Presentation","Application","Transport"],"a":1,"e":"Layer 6 (Presentation) handles translation, encoding, compression and encryption/decryption of the data format."},{"q":"In the 4-layer TCP/IP model, the Internet layer corresponds to which OSI layer?","o":["Layer 2 – Data Link","Layer 3 – Network","Layer 4 – Transport","Layer 7 – Application"],"a":1,"e":"The TCP/IP Internet layer maps to OSI Layer 3 (Network), where IP addressing and routing occur."},{"q":"A network engineer says a problem is occurring at 'Layer 1.' Which is the most likely cause?","o":["A misconfigured default gateway","A bad cable or unplugged interface","An incorrect ACL rule","A DNS resolution failure"],"a":1,"e":"Layer 1 (Physical) issues involve the actual media: cabling, connectors, signal, power. A default gateway is L3, ACLs are L3/4, DNS is L7."},{"q":"Which OSI layer is responsible for logical addressing and determining the best path to a destination?","o":["Layer 2 – Data Link","Layer 3 – Network","Layer 4 – Transport","Layer 5 – Session"],"a":1,"e":"Layer 3 (Network) handles logical (IP) addressing and path determination. Routers operate here."},{"q":"The TCP three-way handshake (SYN, SYN-ACK, ACK) occurs at which OSI layer?","o":["Network","Transport","Session","Application"],"a":1,"e":"TCP is a Layer 4 (Transport) protocol; the handshake establishes a reliable connection between hosts."},{"q":"At which layer do MAC addresses operate?","o":["Layer 1 – Physical","Layer 2 – Data Link","Layer 3 – Network","Layer 4 – Transport"],"a":1,"e":"MAC (hardware) addresses live in the Layer 2 frame header. The MAC sublayer is part of the Data Link layer."},{"q":"Which OSI layer establishes, manages, and terminates sessions between applications?","o":["Transport","Session","Presentation","Network"],"a":1,"e":"Layer 5 (Session) sets up, coordinates, and tears down conversations between applications."},{"q":"Protocols like HTTP, FTP, and SMTP operate at which OSI layer?","o":["Session","Presentation","Application","Transport"],"a":2,"e":"These are Layer 7 (Application) protocols that provide network services directly to user applications."},{"q":"A hub is a Layer 1 device. What does this mean for connected hosts?","o":["It segments collision domains","All ports share one collision domain","It routes between subnets","It tags VLANs"],"a":1,"e":"A hub repeats signals to all ports, so every device shares a single collision domain — unlike a switch, which separates them."},{"q":"In the TCP/IP model, the Network Access (Link) layer corresponds to which OSI layers?","o":["Layers 1 and 2","Layer 3 only","Layers 4 and 5","Layers 5, 6, and 7"],"a":0,"e":"The TCP/IP Network Access layer combines OSI Layer 1 (Physical) and Layer 2 (Data Link)."},{"q":"As a frame is received and processed up the stack, headers are stripped off. This process is called:","o":["Encapsulation","De-encapsulation","Fragmentation","Segmentation"],"a":1,"e":"De-encapsulation removes the headers added by each layer as data moves up the stack at the receiving host."},{"q":"Cabling, voltage levels, and pin assignments are defined at which OSI layer?","o":["Physical","Data Link","Network","Transport"],"a":0,"e":"Layer 1 (Physical) governs the physical medium: connectors, signaling, voltages, and bit transmission."},{"q":"The Frame Check Sequence (FCS) used for error detection is found in which PDU?","o":["Packet","Segment","Frame","Datagram"],"a":2,"e":"The FCS (a CRC) is part of the Layer 2 frame trailer, allowing the receiver to detect transmission errors."},{"q":"Which OSI layer would a proxy that caches and filters web content primarily operate at?","o":["Layer 3 – Network","Layer 4 – Transport","Layer 7 – Application","Layer 2 – Data Link"],"a":2,"e":"A web/content proxy inspects application data (URLs, HTTP), making it a Layer 7 (Application) device."},{"q":"The Data Link layer is divided into which two sublayers?","o":["TCP and UDP","LLC and MAC","IP and ICMP","Hub and Switch"],"a":1,"e":"Layer 2 contains the Logical Link Control (LLC) and Media Access Control (MAC) sublayers."},{"q":"Port numbers that identify a specific application or service are used at which layer?","o":["Network","Transport","Session","Presentation"],"a":1,"e":"Layer 4 (Transport) uses TCP/UDP port numbers to direct segments to the correct application process."},{"q":"Which device makes forwarding decisions based on IP addresses?","o":["Hub","Switch","Router","Repeater"],"a":2,"e":"A router operates at Layer 3 and forwards packets between networks based on destination IP address."},{"q":"Which OSI layer is responsible for data translation, compression, and encryption formatting?","o":["Session","Presentation","Application","Transport"],"a":1,"e":"Layer 6 (Presentation) translates between application and network formats — encoding, compression, and encryption/decryption."},{"q":"Encapsulation order from the top of the stack downward produces which sequence?","o":["Bits, frames, packets, segments","Data, segments, packets, frames, bits","Frames, packets, segments, bits","Packets, segments, frames, bits"],"a":1,"e":"Going down: application data → segments (L4) → packets (L3) → frames (L2) → bits (L1)."},{"q":"A 'destination port unreachable' message most directly relates to which layer's function?","o":["Physical","Data Link","Transport","Session"],"a":2,"e":"Port reachability is a Layer 4 (Transport) concern, since ports identify transport-layer endpoints."},{"q":"An application-layer (Layer 7) firewall differs from a packet filter because it can inspect:","o":["Only source IP addresses","MAC addresses","Application content and context","Cable continuity"],"a":2,"e":"A Layer 7 firewall understands application protocols and can filter based on content, not just IP/port headers."},{"q":"Which statement about the OSI model is correct?","o":["It has 4 layers","Routers operate at Layer 2","It is a conceptual reference model with 7 layers","Switches operate at Layer 3 by default"],"a":2,"e":"OSI is a 7-layer conceptual reference model used to standardize and teach networking functions."},{"q":"A NIC's burned-in physical address operates at which layer?","o":["Layer 1","Layer 2","Layer 3","Layer 4"],"a":1,"e":"The MAC address is a Layer 2 (Data Link) identifier assigned to the network interface card."},{"q":"Which OSI layer provides flow control between two communicating hosts?","o":["Network","Transport","Session","Physical"],"a":1,"e":"Flow control (e.g., TCP windowing) is a Layer 4 Transport function that prevents a fast sender from overwhelming a receiver."},{"q":"The TCP sliding-window mechanism operates at which layer?","o":["Data Link","Network","Transport","Application"],"a":2,"e":"Sliding windows manage in-flight data and acknowledgements at Layer 4 (Transport)."},{"q":"A traditional bridge operates at which OSI layer?","o":["Physical","Data Link","Network","Transport"],"a":1,"e":"Like a switch, a bridge forwards frames using MAC addresses at Layer 2 (Data Link)."},{"q":"The 'default gateway' a host uses to reach other networks is a function of which layer?","o":["Data Link","Network","Transport","Session"],"a":1,"e":"The default gateway is the Layer 3 (Network) router address a host sends off-subnet packets to."},{"q":"The single Application layer in the TCP/IP model corresponds to which OSI layers?","o":["Layers 1, 2, 3","Layers 5, 6, 7","Layers 3 and 4","Layer 7 only"],"a":1,"e":"TCP/IP's Application layer combines OSI Session (5), Presentation (6), and Application (7)."},{"q":"Converting data between formats such as EBCDIC and ASCII is the job of which layer?","o":["Application","Presentation","Session","Transport"],"a":1,"e":"Format translation, encoding, and character-set conversion occur at Layer 6 (Presentation)."},{"q":"The protocol data unit (PDU) at the Network layer is called a:","o":["Frame","Packet","Segment","Bit"],"a":1,"e":"At Layer 3 the PDU is a packet; Layer 2 uses frames and Layer 4 (TCP) uses segments."},{"q":"A multilayer (Layer 3) switch adds capability at which layer compared to a basic switch?","o":["Physical","Data Link","Network","Session"],"a":2,"e":"A multilayer switch performs Layer 3 (Network) routing in hardware in addition to Layer 2 switching."},{"q":"ICMP, used by ping, operates at which OSI layer?","o":["Data Link","Network","Transport","Application"],"a":1,"e":"ICMP is a Layer 3 (Network) protocol that carries control and error messages for IP."},{"q":"Reliable, end-to-end delivery between application processes is provided at which layer?","o":["Network","Transport","Session","Presentation"],"a":1,"e":"Layer 4 (Transport) provides process-to-process reliability via TCP, above Layer 3's host-to-host delivery."},{"q":"A protocol gateway that translates between entirely different stacks can operate up to which layer?","o":["Physical","Data Link","Network","Application"],"a":3,"e":"A full gateway may translate all the way up to Layer 7 (Application), unlike routers or switches."},{"q":"A repeater that simply regenerates and retimes a signal operates at which layer?","o":["Physical","Data Link","Network","Transport"],"a":0,"e":"A repeater works at Layer 1 (Physical), boosting signals without examining addresses."},{"q":"A network socket is the combination of which two values?","o":["MAC and VLAN","IP address and port number","Hostname and TTL","Subnet and gateway"],"a":1,"e":"A socket pairs an IP address (L3) with a transport port (L4) to uniquely identify an endpoint."},{"q":"Late collisions and CRC errors caused by a duplex mismatch are observed at which layer?","o":["Physical","Data Link","Network","Transport"],"a":1,"e":"Duplex mismatches surface as Layer 2 (Data Link) symptoms such as CRC errors, runts, and late collisions."},{"q":"Which organization developed the OSI reference model?","o":["IEEE","ISO","IETF","ANSI"],"a":1,"e":"The International Organization for Standardization (ISO) created the OSI model."},{"q":"Retransmitting lost data using acknowledgements is a reliability feature of which layer?","o":["Network","Transport","Data Link","Session"],"a":1,"e":"TCP at Layer 4 (Transport) detects loss via ACKs and retransmits missing segments."},{"q":"Which layer converts data into electrical, optical, or radio signals on the medium?","o":["Physical","Data Link","Network","Transport"],"a":0,"e":"Layer 1 (Physical) is responsible for encoding bits as signals on the transmission medium."},{"q":"A wireless access point bridging Wi-Fi clients to a wired LAN operates primarily at which layer?","o":["Physical","Data Link","Network","Application"],"a":1,"e":"An AP bridges wireless and wired segments at Layer 2 (Data Link) using MAC addresses."},{"q":"Which layer's header carries source and destination IP addresses?","o":["Data Link","Network","Transport","Presentation"],"a":1,"e":"IP source/destination addresses live in the Layer 3 (Network) header."},{"q":"Which OSI layer is closest to the end user?","o":["Transport","Session","Application","Network"],"a":2,"e":"Layer 7 (Application) is nearest the user, providing the interface to network services."},{"q":"Media access methods such as CSMA/CD are defined at which layer?","o":["Physical","Data Link","Network","Transport"],"a":1,"e":"CSMA/CD and similar access-control methods belong to the MAC sublayer of Layer 2 (Data Link)."},{"q":"A Layer 4 load balancer distributes connections based on:","o":["URL content","IP address and TCP/UDP port","MAC address","HTTP headers"],"a":1,"e":"An L4 load balancer uses IP/port information; a Layer 7 balancer inspects application content like URLs."},{"q":"Fragmentation of an IP packet that exceeds the link MTU occurs at which layer?","o":["Physical","Data Link","Network","Transport"],"a":2,"e":"IP fragmentation to fit the MTU is a Layer 3 (Network) function."},{"q":"A network interface card (NIC) typically operates at which two OSI layers?","o":["Layers 1 and 2","Layers 2 and 3","Layers 3 and 4","Layers 6 and 7"],"a":0,"e":"A NIC works at the Physical (signaling) and Data Link (MAC) layers."}]},
{id:"ipv4",code:"IP4",color:"#34D399",name:"IPv4 Addressing & Subnetting",exam:"Network+ (N10-009)",summary:"An IPv4 address is 32 bits split into network and host portions by a subnet mask. Subnetting is a core Network+ skill — you must be able to find the network, broadcast, usable hosts, and CIDR by hand.",key:["<b>Private ranges (RFC 1918):</b> <span class='k'>10.0.0.0/8</span>, <span class='k'>172.16.0.0/12</span> (172.16–172.31), <span class='k'>192.168.0.0/16</span>.","<b>Special:</b> Loopback <span class='k'>127.0.0.0/8</span>; APIPA <span class='k'>169.254.0.0/16</span> (DHCP failed, no gateway).","<b>Hosts per subnet</b> = 2^(host bits) − 2 (subtract network + broadcast). A <span class='k'>/30</span> has 2 usable hosts — ideal for router point-to-point links.","<b>Block size</b> = 256 − the mask octet. For <span class='k'>/26</span> (255.255.255.192) the block is 64, so subnets start at .0, .64, .128, .192."],table:{"title":"Common prefixes","cols":["CIDR","Mask","Usable hosts"],"rows":[["/24","255.255.255.0","254"],["/25","255.255.255.128","126"],["/26","255.255.255.192","62"],["/27","255.255.255.224","30"],["/28","255.255.255.240","14"],["/30","255.255.255.252","2"]]},q:[{"q":"How many usable host addresses are available in a /26 subnet?","o":["64","62","30","126"],"a":1,"e":"A /26 has 6 host bits → 2^6 = 64 total addresses, minus 2 (network + broadcast) = 62 usable hosts."},{"q":"Which subnet mask should you assign to a point-to-point link between two routers to conserve addresses?","o":["255.255.255.0","255.255.255.192","255.255.255.252","255.255.255.255"],"a":2,"e":"A /30 (255.255.255.252) gives exactly 2 usable hosts — perfect for a P2P link with one address per router."},{"q":"A host is configured with the address 169.254.13.7. What does this indicate?","o":["It received a valid DHCP lease","It is using a public IP","DHCP failed and APIPA self-assigned an address","It is the loopback address"],"a":2,"e":"169.254.0.0/16 is APIPA. A device self-assigns this when it cannot reach a DHCP server, so it has local-only connectivity and no gateway."},{"q":"Which of these is a valid RFC 1918 private address?","o":["172.32.5.10","11.0.0.1","192.168.250.4","169.254.1.1"],"a":2,"e":"Private ranges are 10/8, 172.16–172.31/12, and 192.168/16. 172.32 is outside the 172 range, 11.x is public, and 169.254 is APIPA."},{"q":"For the network 192.168.10.0/27, what is the broadcast address of the first subnet?","o":["192.168.10.15","192.168.10.31","192.168.10.63","192.168.10.255"],"a":1,"e":"/27 has a block size of 32 (256−224). First subnet = .0 to .31, so the broadcast is 192.168.10.31."},{"q":"You need at least 50 usable hosts per subnet. What is the smallest (most efficient) prefix length?","o":["/24","/25","/26","/27"],"a":2,"e":"/26 = 62 usable hosts (covers 50). /27 = only 30 (too small). /25 = 126 (wasteful). /26 is the most efficient fit."},{"q":"What is the network address for the host 10.5.8.130 with a /25 mask?","o":["10.5.8.0","10.5.8.128","10.5.8.64","10.5.8.130"],"a":1,"e":"/25 block size is 128. Subnets are .0 and .128. 130 falls in the .128–.255 range, so the network address is 10.5.8.128."},{"q":"What is the default subnet mask for a Class A network?","o":["255.0.0.0","255.255.0.0","255.255.255.0","255.255.255.255"],"a":0,"e":"Class A uses a default /8 mask: 255.0.0.0."},{"q":"What is the default subnet mask for a Class C network?","o":["255.0.0.0","255.255.0.0","255.255.255.0","255.255.255.192"],"a":2,"e":"Class C uses a default /24 mask: 255.255.255.0."},{"q":"How many usable host addresses are in a /28 subnet?","o":["16","14","30","6"],"a":1,"e":"/28 has 4 host bits: 2^4 = 16 addresses, minus 2 = 14 usable hosts."},{"q":"How many usable host addresses are in a /29 subnet?","o":["8","6","14","2"],"a":1,"e":"/29 has 3 host bits: 2^3 = 8 addresses, minus 2 = 6 usable hosts."},{"q":"How many /26 subnets can be created within a single /24 network?","o":["2","4","8","16"],"a":1,"e":"Going from /24 to /26 borrows 2 bits: 2^2 = 4 subnets."},{"q":"What is the subnet mask represented by the prefix /22?","o":["255.255.255.0","255.255.252.0","255.255.254.0","255.255.248.0"],"a":1,"e":"/22 means 22 network bits: 255.255.252.0."},{"q":"The 172.16.0.0/12 private block spans which address range?","o":["172.16.0.0 – 172.16.255.255","172.0.0.0 – 172.255.255.255","172.16.0.0 – 172.31.255.255","172.16.0.0 – 172.24.255.255"],"a":2,"e":"The /12 covers 172.16.0.0 through 172.31.255.255 — 16 contiguous Class B networks."},{"q":"What is the network address of the host 192.168.1.200/26?","o":["192.168.1.128","192.168.1.192","192.168.1.224","192.168.1.0"],"a":1,"e":"/26 block size is 64. Subnets: .0, .64, .128, .192. 200 falls in .192–.255, so the network is 192.168.1.192."},{"q":"What is the broadcast address for the host 10.10.10.10/29?","o":["10.10.10.7","10.10.10.15","10.10.10.16","10.10.10.8"],"a":1,"e":"/29 block size is 8. The subnet is 10.10.10.8–10.10.10.15, so the broadcast is 10.10.10.15."},{"q":"What is the first usable host address in the subnet 192.168.5.64/26?","o":["192.168.5.64","192.168.5.65","192.168.5.66","192.168.5.1"],"a":1,"e":"The network address is .64, so the first usable host is .65 (last usable .126, broadcast .127)."},{"q":"How many subnets are created when you borrow 3 host bits from a /24 network?","o":["3","6","8","16"],"a":2,"e":"Borrowing 3 bits yields 2^3 = 8 subnets (each a /27)."},{"q":"Which prefix length is needed to support at least 300 hosts in a single subnet?","o":["/24","/23","/25","/22"],"a":1,"e":"/24 = 254 hosts (too few). /23 = 2^9 − 2 = 510 hosts, the smallest prefix that covers 300."},{"q":"What CIDR prefix corresponds to the subnet mask 255.255.255.240?","o":["/26","/27","/28","/29"],"a":2,"e":"255.255.255.240 has 28 network bits, so it is a /28 (16-address blocks)."},{"q":"How many usable host addresses are available in a /20 network?","o":["1022","2046","4094","8190"],"a":2,"e":"/20 has 12 host bits: 2^12 = 4096, minus 2 = 4094 usable hosts."},{"q":"What is the broadcast address of the subnet 192.168.1.96/27?","o":["192.168.1.95","192.168.1.127","192.168.1.111","192.168.1.128"],"a":1,"e":"/27 block size is 32. The subnet 192.168.1.96 spans .96–.127, so the broadcast is .127."},{"q":"Which of these is NOT a valid (contiguous) subnet mask?","o":["255.255.255.224","255.255.255.240","255.255.255.196","255.255.255.128"],"a":2,"e":"255.255.255.196 (196 = 11000100) has non-contiguous 1-bits, which is invalid. Masks must be a solid run of 1s."},{"q":"What is the magic number (block size) for a /28 subnet?","o":["8","16","32","64"],"a":1,"e":"Block size = 256 − 240 = 16, so /28 subnets increment by 16 in the last octet."},{"q":"To which subnet does host 10.1.1.100 with mask 255.255.255.192 belong?","o":["10.1.1.0","10.1.1.64","10.1.1.96","10.1.1.128"],"a":1,"e":"/26 block size is 64: .0, .64, .128, .192. 100 falls in the .64–.127 range, so the subnet is 10.1.1.64."},{"q":"Are hosts 192.168.1.10/24 and 192.168.2.10/24 on the same subnet?","o":["Yes, both are 192.168.x","No, they are on different networks","Only if connected to the same switch","Yes, because the mask matches"],"a":1,"e":"With a /24 mask, the third octet differs (1 vs 2), so they are on separate networks and need a router to communicate."},{"q":"Which range is reserved for IPv4 loopback addresses?","o":["10.0.0.0/8","127.0.0.0/8","169.254.0.0/16","192.168.0.0/16"],"a":1,"e":"127.0.0.0/8 is reserved for loopback; 127.0.0.1 tests the local TCP/IP stack."},{"q":"How many usable hosts does a /23 network provide?","o":["254","510","1022","256"],"a":1,"e":"/23 has 9 host bits: 2^9 = 512, minus 2 = 510 usable hosts."},{"q":"What is the default subnet mask for a Class B network?","o":["255.0.0.0","255.255.0.0","255.255.255.0","255.255.255.128"],"a":1,"e":"Class B uses a default /16 mask: 255.255.0.0."},{"q":"How many bits are in an IPv4 address?","o":["16","32","64","128"],"a":1,"e":"IPv4 addresses are 32 bits, written as four dotted-decimal octets."},{"q":"How many usable host addresses are in a /25 subnet?","o":["128","126","124","254"],"a":1,"e":"/25 has 7 host bits: 2^7 = 128 addresses, minus 2 = 126 usable hosts."},{"q":"How many usable host addresses are in a /27 subnet?","o":["32","30","28","62"],"a":1,"e":"/27 has 5 host bits: 2^5 = 32 addresses, minus 2 = 30 usable hosts."},{"q":"What CIDR prefix corresponds to the mask 255.255.255.248?","o":["/27","/28","/29","/30"],"a":2,"e":"255.255.255.248 has 29 network bits, making it a /29 with 8-address blocks."},{"q":"What subnet mask corresponds to a /30 prefix?","o":["255.255.255.240","255.255.255.248","255.255.255.252","255.255.255.254"],"a":2,"e":"/30 means 30 network bits: 255.255.255.252, providing 2 usable hosts."},{"q":"What is the broadcast address of the subnet 10.0.0.0/30?","o":["10.0.0.1","10.0.0.3","10.0.0.4","10.0.0.7"],"a":1,"e":"/30 block size is 4: the subnet spans 10.0.0.0–10.0.0.3, so the broadcast is 10.0.0.3."},{"q":"What is the network address of host 172.16.50.10 with a /20 mask?","o":["172.16.32.0","172.16.48.0","172.16.50.0","172.16.16.0"],"a":1,"e":"/20 (255.255.240.0) has a 16 block in the third octet: 0,16,32,48. 50 falls in 48–63, so the network is 172.16.48.0."},{"q":"How many /28 subnets fit within a single /24 network?","o":["8","16","32","4"],"a":1,"e":"From /24 to /28 borrows 4 bits: 2^4 = 16 subnets."},{"q":"Which range is the IPv4 Class D (multicast) range?","o":["0.0.0.0 – 127.255.255.255","128.0.0.0 – 191.255.255.255","224.0.0.0 – 239.255.255.255","240.0.0.0 – 255.255.255.255"],"a":2,"e":"Class D, 224.0.0.0–239.255.255.255, is reserved for multicast."},{"q":"The IPv4 range 240.0.0.0 and above (Class E) is reserved for:","o":["Multicast","Experimental/reserved use","Loopback","Private addressing"],"a":1,"e":"Class E (240.0.0.0–255.255.255.255) is reserved for experimental purposes and is not assigned to hosts."},{"q":"What does the address 192.168.1.255 represent in the 192.168.1.0/24 network?","o":["A valid host","The network address","The broadcast address","The default gateway"],"a":2,"e":"In a /24, the last address (.255) is the broadcast address for that subnet."},{"q":"Can the network address 10.0.0.0/24 be assigned to a host interface?","o":["Yes, any address works","No, it identifies the subnet itself","Only on routers","Only with NAT"],"a":1,"e":"The all-zeros host portion is the network (wire) address and cannot be assigned to a host."},{"q":"How many usable host addresses are available in a /16 network?","o":["255","65534","65536","32766"],"a":1,"e":"/16 has 16 host bits: 2^16 = 65,536, minus 2 = 65,534 usable hosts."},{"q":"What is the wildcard mask equivalent of a /24 (255.255.255.0)?","o":["0.0.0.255","255.255.255.0","0.0.255.255","0.255.255.255"],"a":0,"e":"The wildcard is the inverse of the mask: 255.255.255.0 becomes 0.0.0.255."},{"q":"To which subnet does host 192.168.20.130/26 belong?","o":["192.168.20.0","192.168.20.64","192.168.20.128","192.168.20.192"],"a":2,"e":"/26 block size is 64: 0,64,128,192. 130 falls in 128–191, so the subnet is 192.168.20.128."},{"q":"What is the broadcast address for 192.168.20.130/26?","o":["192.168.20.159","192.168.20.191","192.168.20.255","192.168.20.128"],"a":1,"e":"The subnet 192.168.20.128/26 spans .128–.191, so the broadcast is 192.168.20.191."},{"q":"You need at least 6 usable subnets from a /24. What is the minimum number of bits to borrow?","o":["2 bits","3 bits","4 bits","5 bits"],"a":1,"e":"Borrowing 3 bits gives 2^3 = 8 subnets (covers 6); 2 bits gives only 4."},{"q":"What CIDR prefix matches the subnet mask 255.255.240.0?","o":["/19","/20","/21","/22"],"a":1,"e":"255.255.240.0 has 20 network bits, making it a /20."},{"q":"How many total addresses (including network and broadcast) are in a /29?","o":["4","6","8","16"],"a":2,"e":"/29 has 3 host bits: 2^3 = 8 total addresses (6 usable)."},{"q":"The IPv4 address 0.0.0.0 generally represents:","o":["A loopback","An unspecified address / this host","A broadcast","A multicast"],"a":1,"e":"0.0.0.0 denotes an unspecified address (this host) and, as 0.0.0.0/0, the default route."},{"q":"What is the first usable host address in the 10.0.0.0/8 network?","o":["10.0.0.0","10.0.0.1","10.0.0.255","10.1.1.1"],"a":1,"e":"The network address is 10.0.0.0, so the first usable host is 10.0.0.1."}]},
{id:"ipv6",code:"IP6",color:"#38BDF8",name:"IPv6 Fundamentals",exam:"Network+ (N10-009)",summary:"IPv6 uses 128-bit addresses written in hexadecimal to solve IPv4 exhaustion. There is no broadcast and no NAT requirement — autoconfiguration and multicast replace many IPv4 mechanisms.",key:["<b>Compression:</b> drop leading zeros per group; replace one run of all-zero groups with <span class='k'>::</span> (only once). e.g. <span class='k'>2001:0db8:0000:0000:0000:0000:0000:0001</span> → <span class='k'>2001:db8::1</span>.","<b>Address types:</b> Global unicast <span class='k'>2000::/3</span>, Link-local <span class='k'>fe80::/10</span> (auto, every interface), Unique local <span class='k'>fc00::/7</span>, Multicast <span class='k'>ff00::/8</span>.","<b>No broadcast:</b> IPv6 uses multicast instead. Loopback is <span class='k'>::1</span>; the unspecified address is <span class='k'>::</span>.","<b>SLAAC</b> lets hosts self-configure from Router Advertisements; <b>EUI-64</b> derives the interface ID from the MAC address."],q:[{"q":"Which IPv6 address type is automatically assigned to every interface and is only valid on the local link?","o":["Global unicast (2000::/3)","Link-local (fe80::/10)","Unique local (fc00::/7)","Multicast (ff00::/8)"],"a":1,"e":"Every IPv6 interface auto-generates a link-local address in fe80::/10. It's used for neighbor discovery and routing protocols but is not routable beyond the local link."},{"q":"What is the fully compressed form of 2001:0db8:0000:0000:0000:0000:0000:00a1?","o":["2001:db8::a1","2001:db8:0:0::a1","2001:0db8::00a1","21:db8::a1"],"a":0,"e":"Drop leading zeros in each group and collapse the long run of zero groups with a single ::, giving 2001:db8::a1."},{"q":"How does IPv6 handle the function that broadcast served in IPv4?","o":["It still uses broadcast addresses","It uses multicast and anycast instead","It relies on NAT","It uses APIPA"],"a":1,"e":"IPv6 eliminates broadcast entirely. Functions like neighbor discovery use multicast (e.g., all-nodes ff02::1), which is more efficient."},{"q":"Which IPv6 address is the loopback address, equivalent to 127.0.0.1 in IPv4?","o":["::","::1","fe80::1","ff02::1"],"a":1,"e":"::1 is the IPv6 loopback. :: alone is the unspecified address used before an interface has an address."},{"q":"What technology allows an IPv6 host to configure its own address using Router Advertisements without a DHCP server?","o":["DHCPv6","SLAAC","NAT66","ARP"],"a":1,"e":"SLAAC (Stateless Address Autoconfiguration) lets a host build its own global address from the prefix advertised by the router."},{"q":"How many bits are in an IPv6 address?","o":["32","64","128","256"],"a":2,"e":"IPv6 addresses are 128 bits (vs 32 for IPv4), written as eight groups of four hexadecimal digits."},{"q":"An IPv6 address is written as how many groups of hexadecimal digits?","o":["Four groups of eight","Eight groups of four","Six groups of four","Eight groups of eight"],"a":1,"e":"IPv6 is 128 bits written as eight groups (hextets) of four hexadecimal digits, separated by colons."},{"q":"Which prefix identifies IPv6 global unicast addresses?","o":["fe80::/10","fc00::/7","2000::/3","ff00::/8"],"a":2,"e":"Globally routable unicast addresses currently come from 2000::/3."},{"q":"Which prefix is used for IPv6 unique local addresses (the private-equivalent range)?","o":["2000::/3","fc00::/7","fe80::/10","ff02::/16"],"a":1,"e":"Unique local addresses use fc00::/7 (in practice fd00::/8) — comparable to RFC 1918 private space."},{"q":"How many times may the :: abbreviation appear in a single IPv6 address?","o":["Once","Twice","As many as needed","Never"],"a":0,"e":":: may be used only once per address, because multiple uses would make the number of zero groups ambiguous."},{"q":"What protocol does IPv6 use instead of ARP to map addresses to link-layer addresses?","o":["ICMPv6 Neighbor Discovery (NDP)","RARP","DHCPv6","Proxy ARP"],"a":0,"e":"IPv6 uses the Neighbor Discovery Protocol (part of ICMPv6) with Neighbor Solicitation/Advertisement messages instead of ARP."},{"q":"Which IPv6 multicast address reaches all nodes on the local link?","o":["ff02::1","ff02::2","ff02::5","::1"],"a":0,"e":"ff02::1 is the all-nodes link-local multicast address; ff02::2 reaches all routers."},{"q":"The EUI-64 process generates the interface ID portion of an address from what?","o":["The IPv4 address","The MAC address","A random value","The DHCP lease"],"a":1,"e":"EUI-64 expands the 48-bit MAC into a 64-bit interface ID by inserting FFFE in the middle and flipping the 7th bit."},{"q":"What is the IPv6 unspecified address?","o":["::1","::","fe80::","ff00::"],"a":1,"e":":: (all zeros) is the unspecified address, used as a source before an interface has been assigned an address."},{"q":"What prefix length is standard for an IPv6 LAN/subnet?","o":["/32","/48","/64","/128"],"a":2,"e":"A /64 is the standard subnet prefix, leaving 64 bits for the interface ID and enabling SLAAC."},{"q":"What does running 'dual stack' mean?","o":["Two default gateways","Operating IPv4 and IPv6 simultaneously","Two DNS servers","Stacking two switches"],"a":1,"e":"Dual stack means a device or network runs IPv4 and IPv6 at the same time, choosing the right protocol per destination."},{"q":"Which technology tunnels IPv6 traffic across an IPv4-only network?","o":["6to4","SLAAC","NDP","CIDR"],"a":0,"e":"6to4 (along with Teredo and ISATAP) encapsulates IPv6 packets inside IPv4 to traverse IPv4 infrastructure."},{"q":"Does IPv6 require NAT the way IPv4 typically does?","o":["Yes, always","No, the address space is large enough to avoid it","Only for web servers","Only on Cisco devices"],"a":1,"e":"IPv6 has enough global addresses that NAT is not required for connectivity, though translation mechanisms still exist for specific cases."},{"q":"Compress the address 2001:0db8:0000:0000:0000:ff00:0042:8329.","o":["2001:db8::ff00:42:8329","2001:db8:0:ff00::42:8329","2001:0db8::ff:42:8329","21:db8::ff00:42:8329"],"a":0,"e":"Drop leading zeros per group and collapse the run of zero groups: 2001:db8::ff00:42:8329."},{"q":"Which prefix is reserved for IPv6 multicast?","o":["fe80::/10","fc00::/7","ff00::/8","2000::/3"],"a":2,"e":"All IPv6 multicast addresses begin with ff00::/8."},{"q":"A link-local IPv6 address (fe80::/10) can be routed:","o":["Across the internet","Only on the local link","Through any router","To global unicast hosts"],"a":1,"e":"Link-local addresses are valid only on the local link and are never forwarded by routers."},{"q":"Which IPv6 address is the loopback?","o":["::","::1","fe80::1","ff02::1"],"a":1,"e":"::1 is the IPv6 loopback, equivalent to 127.0.0.1 in IPv4."},{"q":"Link-local IPv6 addresses are configured how?","o":["Manually only","Automatically by the host","Via DHCPv6 only","Via BGP"],"a":1,"e":"Every IPv6 interface automatically generates a link-local address without any DHCP server."},{"q":"DHCPv6 differs from SLAAC in that DHCPv6:","o":["Cannot assign addresses","Uses a server to assign and track addresses/options","Only works on IPv4","Replaces NDP"],"a":1,"e":"DHCPv6 provides stateful assignment and tracking of addresses and options from a server, whereas SLAAC is stateless self-configuration."},{"q":"Approximately how many addresses does the 128-bit IPv6 space provide?","o":["About 4.3 billion","About 2^32","About 2^128 (a vast number)","Exactly 1 trillion"],"a":2,"e":"IPv6 provides 2^128 addresses — an enormous space compared to IPv4's 2^32 (~4.3 billion)."},{"q":"Which IPv6 multicast address reaches all routers on the local link?","o":["ff02::1","ff02::2","ff05::2","::1"],"a":1,"e":"ff02::2 is the all-routers link-local multicast address."},{"q":"How large is the fixed IPv6 base header?","o":["20 bytes","40 bytes","60 bytes","8 bytes"],"a":1,"e":"The IPv6 base header is a fixed 40 bytes (IPv4's header was variable, 20–60 bytes)."},{"q":"Which IPv4 header field was removed in IPv6 to speed up router processing?","o":["Source address","Header checksum","Version","Hop limit"],"a":1,"e":"IPv6 dropped the header checksum, relying on lower and upper layers for integrity."},{"q":"Which IPv6 field replaces the IPv4 TTL?","o":["Flow Label","Hop Limit","Traffic Class","Next Header"],"a":1,"e":"The Hop Limit field decrements per hop in IPv6, just as TTL did in IPv4."},{"q":"In IPv6, packet fragmentation is performed by:","o":["Every router","The source host (using Path MTU Discovery)","The destination host","The default gateway"],"a":1,"e":"IPv6 routers do not fragment; the source handles sizing via Path MTU Discovery."},{"q":"The solicited-node multicast address in IPv6 is primarily used for:","o":["Routing updates","Address resolution and duplicate address detection","Broadcasting","DNS queries"],"a":1,"e":"Solicited-node multicast efficiently targets neighbor solicitation for address resolution and DAD."},{"q":"Duplicate Address Detection (DAD) in IPv6 relies on which protocol?","o":["ARP","NDP (Neighbor Discovery)","DHCPv6","RIPng"],"a":1,"e":"DAD uses NDP Neighbor Solicitation messages to verify an address is not already in use."},{"q":"In a typical global unicast address, the first 48 bits represent the:","o":["Interface ID","Global routing prefix (site)","Checksum","Hop limit"],"a":1,"e":"The leading bits form the global routing prefix; a /48 is a common site allocation."},{"q":"An IPv6 anycast address is:","o":["Sent to all nodes","Assigned to multiple interfaces and delivered to the nearest one","A loopback","Never routable"],"a":1,"e":"Anycast addresses are shared by multiple nodes; traffic goes to the topologically nearest."},{"q":"An address written as ::ffff:192.168.1.1 is a(n):","o":["Link-local address","IPv4-mapped IPv6 address","Multicast address","Anycast address"],"a":1,"e":"::ffff:a.b.c.d is an IPv4-mapped IPv6 address used to represent IPv4 nodes in IPv6 sockets."},{"q":"The IPv6 prefix 2001:db8::/32 is reserved for:","o":["Multicast","Documentation and examples","Loopback","Private use"],"a":1,"e":"2001:db8::/32 is set aside for documentation, so it should never appear on production networks."},{"q":"SLAAC is described as 'stateless' because:","o":["It encrypts addresses","No server tracks which addresses are assigned","It uses TCP","It requires DHCP"],"a":1,"e":"With SLAAC, hosts self-configure from Router Advertisements and no server maintains assignment state."},{"q":"Which NDP messages does a host use to discover routers?","o":["DHCP Discover/Offer","Router Solicitation / Router Advertisement","SYN/ACK","Hello/Dead"],"a":1,"e":"Hosts send Router Solicitations and routers reply with Router Advertisements to convey prefixes and gateways."},{"q":"Under SLAAC with a /64 prefix, the interface ID is how many bits?","o":["32","48","64","128"],"a":2,"e":"A /64 leaves 64 bits for the interface ID, which SLAAC fills (e.g., via EUI-64 or random)."},{"q":"The IPv6 loopback address ::1 is usually expressed with which prefix length?","o":["/8","/64","/128","/10"],"a":2,"e":"::1/128 is a single host address representing the loopback."},{"q":"The IPv6 multicast scope value in ff02:: indicates which scope?","o":["Global","Site-local","Link-local","Organization-local"],"a":2,"e":"The '2' in ff02:: denotes link-local multicast scope (limited to the local link)."},{"q":"IPv6 privacy extensions (RFC 4941) randomize which part of a SLAAC address?","o":["The prefix","The interface ID","The hop limit","The flow label"],"a":1,"e":"Privacy extensions periodically randomize the interface ID to limit MAC-based tracking."},{"q":"Teredo tunneling encapsulates IPv6 traffic inside:","o":["TCP/IPv4","UDP/IPv4 (to traverse NAT)","ICMP","Ethernet only"],"a":1,"e":"Teredo wraps IPv6 in UDP over IPv4 so it can pass through NAT devices."},{"q":"In an IPv6 address, the :: abbreviation represents:","o":["A single zero digit","One or more consecutive groups of all zeros","The interface ID","The prefix length"],"a":1,"e":":: collapses one contiguous run of all-zero 16-bit groups and may be used only once."},{"q":"In the address fe80::1%eth0, what does %eth0 specify?","o":["A subnet mask","The zone/scope (interface) identifier","A port","An anycast flag"],"a":1,"e":"The %interface zone ID tells the OS which link a link-local address applies to."},{"q":"What is the minimum MTU required for IPv6 links?","o":["576 bytes","1280 bytes","1500 bytes","9000 bytes"],"a":1,"e":"IPv6 mandates a minimum link MTU of 1280 bytes."},{"q":"Compared with broadcast, IPv6 multicast is more efficient because:","o":["It reaches every device","Only subscribed/interested nodes process the traffic","It uses TCP","It is encrypted"],"a":1,"e":"Multicast targets only nodes that have joined the group, avoiding the overhead broadcast imposes on all hosts."},{"q":"A /48 IPv6 block is commonly allocated to:","o":["A single host","A site or organization","One interface","A multicast group"],"a":1,"e":"A /48 is a typical allocation for a site, leaving room for many /64 subnets."},{"q":"IPv6 global unicast addresses are the equivalent of which IPv4 address type?","o":["Private addresses","Public (internet-routable) addresses","Loopback","APIPA"],"a":1,"e":"Global unicast addresses are publicly routable, like IPv4 public addresses."},{"q":"Before it has an address, a host sends a Router Solicitation using which source address?","o":["::1","fe80::1","The unspecified address ::","ff02::2"],"a":2,"e":"With no configured address yet, the host uses :: (unspecified) as the source of its Router Solicitation."}]},
{id:"ports",code:"PRT",color:"#FBBF24",name:"Ports & Protocols",exam:"Network+ (N10-009)",summary:"Layer 4 uses port numbers to direct traffic to the right service. Memorizing the well-known ports is heavily tested, and knowing TCP vs UDP behavior is essential.",key:["<b>TCP</b> is connection-oriented and reliable (3-way handshake: SYN, SYN-ACK, ACK). <b>UDP</b> is connectionless, fast, and best-effort — used for DNS, DHCP, VoIP, streaming.","<b>Port ranges:</b> well-known <span class='k'>0–1023</span>, registered <span class='k'>1024–49151</span>, dynamic/ephemeral <span class='k'>49152–65535</span>.","<b>Secure vs insecure pairs:</b> HTTP 80 → HTTPS 443; Telnet 23 → SSH 22; FTP 21 → SFTP (over SSH 22); LDAP 389 → LDAPS 636.","<b>Management traffic:</b> SNMP <span class='k'>161/162</span>, Syslog <span class='k'>514</span>, NTP <span class='k'>123</span>, RDP <span class='k'>3389</span>."],table:{"title":"Must-know ports","cols":["Service","Port","Proto"],"rows":[["FTP","20/21","TCP"],["SSH / SFTP","22","TCP"],["Telnet","23","TCP"],["SMTP","25","TCP"],["DNS","53","TCP/UDP"],["DHCP","67/68","UDP"],["HTTP","80","TCP"],["HTTPS","443","TCP"],["RDP","3389","TCP"],["SNMP","161/162","UDP"]]},q:[{"q":"Which port does HTTPS use by default?","o":["80","8080","443","22"],"a":2,"e":"HTTPS (HTTP secured with TLS) uses TCP port 443. Port 80 is plain HTTP."},{"q":"A technician needs a secure, encrypted remote command-line session to a router. Which protocol and port should be used?","o":["Telnet, port 23","SSH, port 22","RDP, port 3389","FTP, port 21"],"a":1,"e":"SSH (TCP 22) provides an encrypted CLI session. Telnet (23) sends everything in cleartext and should be avoided."},{"q":"Which protocol uses UDP ports 67 and 68 to assign IP addresses automatically?","o":["DNS","DHCP","SNMP","NTP"],"a":1,"e":"DHCP uses UDP port 67 (server) and 68 (client) during the DORA process to lease IP configuration."},{"q":"What is the primary difference between TCP and UDP?","o":["TCP is faster than UDP","UDP is connection-oriented and reliable","TCP is connection-oriented and reliable; UDP is connectionless and best-effort","UDP guarantees in-order delivery"],"a":2,"e":"TCP establishes a connection (3-way handshake) and guarantees delivery and ordering. UDP is connectionless, has no handshake, and trades reliability for speed."},{"q":"DNS primarily uses which port?","o":["53","123","389","443"],"a":0,"e":"DNS uses port 53 — UDP for standard queries and TCP for zone transfers or large responses."},{"q":"Which port range is considered the 'well-known' ports?","o":["0–1023","1024–49151","49152–65535","1–65535"],"a":0,"e":"0–1023 are well-known ports (HTTP, HTTPS, SSH, etc.). 1024–49151 are registered, and 49152–65535 are dynamic/ephemeral."},{"q":"A monitoring server collects log messages from network devices. Which protocol and port is standard for this?","o":["SNMP, 161","Syslog, 514","NTP, 123","RDP, 3389"],"a":1,"e":"Syslog (UDP 514) is the standard for collecting log/event messages. SNMP (161/162) handles device monitoring and traps, a related but distinct function."},{"q":"Which port does the FTP control channel use?","o":["20","21","22","23"],"a":1,"e":"FTP uses TCP port 21 for control/commands and port 20 for active-mode data transfer."},{"q":"Which port does Telnet use?","o":["22","23","25","443"],"a":1,"e":"Telnet uses TCP port 23. It is unencrypted and should be replaced by SSH."},{"q":"Which port does SMTP use for sending mail?","o":["25","110","143","443"],"a":0,"e":"SMTP uses TCP port 25 for mail transfer (port 587 is used for authenticated submission)."},{"q":"Which port does standard (unencrypted) HTTP use?","o":["80","8080","443","21"],"a":0,"e":"HTTP uses TCP port 80. 8080 is a common alternate/proxy port."},{"q":"Which port does NTP use for time synchronization?","o":["53","123","161","514"],"a":1,"e":"NTP (Network Time Protocol) uses UDP port 123."},{"q":"Which port does LDAP use?","o":["389","636","443","53"],"a":0,"e":"LDAP uses TCP/UDP port 389; LDAPS (over TLS) uses 636."},{"q":"Which port does TFTP use?","o":["20","69","123","161"],"a":1,"e":"TFTP (Trivial FTP) uses UDP port 69 and has no authentication."},{"q":"Which port is used by SMB/CIFS for file sharing?","o":["139","445","389","3389"],"a":1,"e":"Modern SMB uses TCP port 445 for direct file sharing."},{"q":"The TCP three-way handshake follows which sequence?","o":["ACK, SYN, SYN-ACK","SYN, SYN-ACK, ACK","SYN, ACK, FIN","FIN, ACK, SYN"],"a":1,"e":"TCP establishes a connection with SYN → SYN-ACK → ACK before any data is exchanged."},{"q":"Which transport protocol does HTTPS rely on?","o":["UDP","TCP","ICMP","ARP"],"a":1,"e":"HTTPS uses TCP (port 443), since TLS requires the reliable, ordered delivery TCP provides."},{"q":"Which of these services typically uses UDP rather than TCP?","o":["HTTPS","SSH","DNS query","FTP"],"a":2,"e":"Standard DNS queries use UDP (port 53) for speed; HTTPS, SSH, and FTP use TCP."},{"q":"What is the default port for Microsoft RDP?","o":["3306","1433","3389","5900"],"a":2,"e":"RDP uses TCP port 3389 for remote desktop sessions."},{"q":"What is the default port for Microsoft SQL Server?","o":["3306","1433","1521","5432"],"a":1,"e":"SQL Server listens on TCP port 1433."},{"q":"Which protocol provides reliable, connection-oriented, ordered delivery?","o":["UDP","TCP","ICMP","IP"],"a":1,"e":"TCP guarantees delivery, ordering, and flow/congestion control through acknowledgements and sequencing."},{"q":"SIP, used for VoIP call setup, commonly uses which ports?","o":["5060/5061","1720","3389","69"],"a":0,"e":"SIP uses ports 5060 (unencrypted) and 5061 (TLS-encrypted) for signaling."},{"q":"What is the well-known port range?","o":["0–1023","1024–49151","49152–65535","0–65535"],"a":0,"e":"Ports 0–1023 are well-known; 1024–49151 are registered; 49152–65535 are dynamic/ephemeral."},{"q":"How does a TCP connection gracefully close?","o":["A single RST","A FIN/ACK exchange","An ICMP unreachable","A SYN flood"],"a":1,"e":"TCP uses a FIN/ACK exchange (effectively four segments) to gracefully terminate a connection."},{"q":"In active-mode FTP, which port carries the data connection?","o":["20","21","22","69"],"a":0,"e":"Active FTP uses TCP 21 for control and TCP 20 for the data channel."},{"q":"Which port range is the dynamic/ephemeral range?","o":["0–1023","1024–49151","49152–65535","1–1024"],"a":2,"e":"Ports 49152–65535 are dynamic/ephemeral, used as temporary client source ports."},{"q":"DNS over HTTPS (DoH) sends queries over which port?","o":["53","443","853","80"],"a":1,"e":"DoH tunnels DNS within HTTPS on TCP port 443."},{"q":"Which transport protocol has lower overhead and no connection setup?","o":["TCP","UDP","TLS","SCTP"],"a":1,"e":"UDP is connectionless with minimal overhead and no handshake, unlike TCP."},{"q":"SFTP (SSH File Transfer Protocol) operates over which port?","o":["20","21","22","990"],"a":2,"e":"SFTP runs inside an SSH session on TCP port 22."},{"q":"Which port is used for authenticated SMTP mail submission (with STARTTLS)?","o":["25","465","587","110"],"a":2,"e":"Port 587 is the standard mail submission port for authenticated clients."},{"q":"Which transport protocol does RTP (real-time media) typically use?","o":["TCP","UDP","ICMP","ARP"],"a":1,"e":"RTP carries voice/video over UDP (using dynamic ports) for low latency."},{"q":"In network traffic types, a unicast transmission is:","o":["One-to-all in a subnet","One-to-one between a single sender and receiver","One-to-many to a group","One-to-nearest member"],"a":1,"e":"Unicast is direct one-to-one delivery from a single source to a single destination."},{"q":"A broadcast transmission is delivered to:","o":["A single host","All hosts on the local subnet","Only multicast subscribers","The nearest node"],"a":1,"e":"Broadcast reaches every device within the same broadcast domain/subnet."},{"q":"A multicast transmission is delivered to:","o":["Every host on the subnet","One specific host","A group of subscribed hosts (one-to-many)","The closest host only"],"a":2,"e":"Multicast efficiently sends one stream to all members that have joined the multicast group."},{"q":"An anycast address delivers traffic to:","o":["All nodes sharing the address","The topologically nearest node sharing the address","A random node","Every subnet simultaneously"],"a":1,"e":"Anycast routes to the nearest of several nodes advertising the same address (common for DNS roots)."},{"q":"Which protocol do ping and traceroute rely on, and carries no application data?","o":["TCP","UDP","ICMP","GRE"],"a":2,"e":"ICMP is a diagnostic/error-reporting protocol used by ping and traceroute; it carries no user data."},{"q":"Generic Routing Encapsulation (GRE) is best described as:","o":["An encryption protocol","A tunneling protocol that encapsulates traffic but provides no encryption","A routing protocol","A switching protocol"],"a":1,"e":"GRE creates a virtual point-to-point tunnel by encapsulating packets, but it does not encrypt them."},{"q":"IPsec is made up of which components?","o":["SYN, ACK, FIN","AH, ESP, and IKE","TCP, UDP, ICMP","SSL, TLS, SSH"],"a":1,"e":"IPsec uses AH (authentication/integrity), ESP (encryption), and IKE (key exchange)."},{"q":"Because GRE provides no encryption, it is commonly paired with:","o":["HTTP","IPsec","Telnet","SNMP"],"a":1,"e":"GRE tunnels are frequently secured by running them inside IPsec for confidentiality."},{"q":"Which secure protocol replaces FTP for encrypted file transfer?","o":["TFTP","SFTP","SMB","SNMP"],"a":1,"e":"SFTP runs over SSH (port 22), encrypting file transfers that plain FTP sends in the clear."},{"q":"Which secure protocol replaces Telnet for encrypted remote command-line access?","o":["RDP","SSH","HTTP","LDAP"],"a":1,"e":"SSH (port 22) encrypts the remote CLI session that Telnet (port 23) sends in plaintext."},{"q":"Which protocol replaces HTTP to provide encrypted web traffic?","o":["FTP","HTTPS","SMTP","SMB"],"a":1,"e":"HTTPS (port 443) secures web traffic with TLS, unlike plaintext HTTP on port 80."},{"q":"Which protocol provides encrypted directory access in place of LDAP?","o":["LDAPS","RADIUS","TFTP","NTP"],"a":0,"e":"LDAPS (port 636) secures LDAP (port 389) directory queries with SSL/TLS."},{"q":"Which transport protocol does TFTP use, reflecting its lightweight design?","o":["TCP","UDP","ICMP","GRE"],"a":1,"e":"TFTP uses UDP (port 69) and has no authentication, making it simple but unreliable."},{"q":"In an IP header, the protocol number (e.g., 1, 6, 17) identifies:","o":["The destination port","The encapsulated protocol (ICMP=1, TCP=6, UDP=17)","The MAC address","The VLAN ID"],"a":1,"e":"The protocol field tells the receiver which protocol is inside the IP packet."},{"q":"Traffic sent over HTTP (port 80) is transmitted:","o":["Encrypted with TLS","In plaintext (unencrypted)","Compressed only","Over UDP"],"a":1,"e":"HTTP sends data in the clear; HTTPS (443) must be used to encrypt it."},{"q":"The three IPsec elements AH, ESP, and IKE respectively handle:","o":["Routing, switching, bridging","Integrity, encryption, and key exchange","DNS, DHCP, NAT","Speed, duplex, MTU"],"a":1,"e":"AH ensures integrity, ESP provides encryption, and IKE negotiates keys and security associations."},{"q":"A firewall blocking inbound TCP port 3389 would prevent:","o":["Web browsing","Remote Desktop (RDP) connections","DNS lookups","Email delivery"],"a":1,"e":"RDP uses TCP 3389, so blocking it stops inbound remote desktop sessions."},{"q":"Which port does Telnet use for unencrypted remote access?","o":["22","23","25","80"],"a":1,"e":"Telnet uses TCP port 23 and sends data in plaintext, so SSH (port 22) is preferred."},{"q":"Which port does unencrypted LDAP directory access use?","o":["53","389","443","636"],"a":1,"e":"LDAP uses TCP port 389; LDAPS secures the same service on port 636."}]},
{id:"switching",code:"SW2",color:"#FBBF24",name:"Switching, VLANs & STP",exam:"Network+ (N10-009)",summary:"Switches build forwarding tables of MAC addresses and segment broadcast domains using VLANs. Spanning Tree Protocol prevents Layer-2 loops that would otherwise cause broadcast storms.",key:["<b>VLANs</b> segment one physical switch into multiple broadcast domains. <span class='k'>802.1Q</span> tags frames on <b>trunk</b> ports; <b>access</b> ports carry a single VLAN, untagged.","<b>Native VLAN</b> traffic on a trunk is sent untagged (default VLAN 1). Valid VLAN IDs are <span class='k'>1–4094</span>.","<b>STP (802.1D)</b> elects a <b>root bridge</b> (lowest bridge ID) and blocks redundant paths to prevent Layer-2 loops; <b>RSTP (802.1w)</b> does the same but converges much faster. States: <i>blocking → learning → forwarding</i>.","<b>Other features:</b> <span class='k'>link aggregation</span> (LACP) bundles links for speed/redundancy; <b>SVIs</b> and subinterfaces enable inter-VLAN routing; <b>jumbo frames</b> raise MTU above 1500 bytes. Always match <b>speed/duplex</b> on both ends."],q:[{"q":"What is the primary purpose of Spanning Tree Protocol (STP)?","o":["To assign IP addresses to switches","To prevent Layer 2 switching loops","To encrypt VLAN traffic","To route between VLANs"],"a":1,"e":"STP detects and logically blocks redundant Layer-2 paths to prevent loops and the broadcast storms they cause, while keeping a backup path ready."},{"q":"Which protocol is the IEEE standard for VLAN tagging on a trunk link?","o":["ISL","802.1Q","802.1X","802.11"],"a":1,"e":"802.1Q is the open IEEE standard that inserts a VLAN tag into the Ethernet frame. ISL was Cisco's older proprietary method."},{"q":"How is the root bridge selected in a spanning-tree topology?","o":["The switch with the highest IP address","The switch with the lowest bridge ID (priority + MAC)","The switch with the most ports","The first switch powered on"],"a":1,"e":"The switch with the lowest bridge ID wins. Bridge ID = priority value + MAC address; if priorities tie, the lowest MAC breaks it."},{"q":"A port is configured as an access port. How many VLANs can it carry?","o":["One","Up to 4094","Two (data + voice native)","Unlimited"],"a":0,"e":"An access port belongs to a single VLAN and sends untagged frames. (A special voice-VLAN case can add a tagged voice VLAN, but the standard answer is one data VLAN.)"},{"q":"Traffic on a trunk's native VLAN is transmitted in what manner?","o":["Encrypted","Tagged with 802.1Q","Untagged","Dropped"],"a":2,"e":"By default, frames on the native VLAN cross a trunk untagged. All other VLANs are tagged with their 802.1Q VLAN ID."},{"q":"What is the default VLAN on a Cisco switch?","o":["VLAN 0","VLAN 1","VLAN 99","VLAN 1002"],"a":1,"e":"All switch ports are in VLAN 1 by default. Best practice is to move user traffic off VLAN 1."},{"q":"What is the valid range of usable VLAN IDs?","o":["1–1024","1–4094","0–4095","1–256"],"a":1,"e":"VLAN IDs 1–4094 are valid (with some reserved); the 802.1Q tag field is 12 bits."},{"q":"How does a switch build its MAC address table?","o":["By reading destination MACs","By recording the source MAC of incoming frames","From DHCP leases","From the routing table"],"a":1,"e":"A switch learns the source MAC of frames arriving on each port and maps it to that port."},{"q":"What does a switch do with a frame destined for an unknown unicast MAC?","o":["Drops it","Floods it out all ports except the one it arrived on","Sends it to the default gateway","Buffers it indefinitely"],"a":1,"e":"With no table entry, the switch floods the frame out all other ports; the reply lets it learn the location."},{"q":"Which protocol is the faster successor to the original 802.1D Spanning Tree?","o":["802.1Q","802.1w (RSTP)","802.1X","802.3ad"],"a":1,"e":"RSTP (802.1w) converges far faster than the original 802.1D STP."},{"q":"In STP, the root port on a non-root switch is:","o":["The port with the highest cost to root","The lowest-cost path toward the root bridge","Always the highest-numbered port","A blocked port"],"a":1,"e":"The root port is the single port offering the lowest-cost path back to the root bridge."},{"q":"Inter-VLAN routing requires which type of device?","o":["A Layer 2 switch","A router or Layer 3 switch","A hub","A media converter"],"a":1,"e":"Traffic between VLANs must be routed at Layer 3 — by a router (router-on-a-stick) or a multilayer/L3 switch (SVIs)."},{"q":"Router-on-a-stick provides inter-VLAN routing using:","o":["Multiple physical interfaces only","Subinterfaces with 802.1Q tagging on one trunk","A separate router per VLAN","STP"],"a":1,"e":"A single router interface is divided into subinterfaces, each tagged for a VLAN, over an 802.1Q trunk."},{"q":"What is the destination MAC address of a broadcast frame?","o":["00:00:00:00:00:00","FF:FF:FF:FF:FF:FF","01:00:5E:00:00:01","The default gateway MAC"],"a":1,"e":"A Layer 2 broadcast uses the all-ones destination MAC FF:FF:FF:FF:FF:FF."},{"q":"On a switch, each individual port represents:","o":["One shared collision domain","Its own collision domain","One broadcast domain per switch","A routed interface"],"a":1,"e":"Switches place each port in its own collision domain; a VLAN defines a broadcast domain."},{"q":"A MAC flooding (CAM table overflow) attack is best mitigated by:","o":["Spanning Tree","Port security","DHCP relay","NAT"],"a":1,"e":"Port security limits the number of MAC addresses per port, preventing CAM table overflow attacks."},{"q":"An SVI (Switch Virtual Interface) provides:","o":["A physical uplink","A Layer 3 interface for a VLAN on a multilayer switch","A trunk encapsulation","Port mirroring"],"a":1,"e":"An SVI is a virtual routed interface representing a VLAN, used for inter-VLAN routing and management."},{"q":"What typically causes a broadcast storm on a switched network?","o":["Too many VLANs","A Layer 2 loop with no STP","An ACL misconfiguration","A DNS failure"],"a":1,"e":"Without STP,
