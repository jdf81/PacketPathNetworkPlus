 redundant Layer 2 paths create loops that endlessly replicate broadcasts — a broadcast storm."},{"q":"Full-duplex operation on a switch port:","o":["Requires CSMA/CD","Eliminates collisions","Halves throughput","Disables the port"],"a":1,"e":"A dedicated full-duplex link has no contention, so collisions cannot occur and CSMA/CD is unnecessary."},{"q":"A native VLAN mismatch on a trunk can cause:","o":["Faster convergence","Traffic from one VLAN leaking into another","Automatic VLAN creation","Improved security"],"a":1,"e":"If trunk ends disagree on the native VLAN, untagged traffic can leak between VLANs — a misconfiguration and security risk."},{"q":"Which port type carries traffic for multiple VLANs between switches?","o":["Access port","Trunk port","Loopback","Console port"],"a":1,"e":"A trunk port carries multiple VLANs, tagging frames with 802.1Q so the far end can separate them."},{"q":"What is the default STP forward delay total (listening + learning) on 802.1D?","o":["About 2 seconds","About 30 seconds","About 5 minutes","Instant"],"a":1,"e":"Classic 802.1D spends ~15s listening and ~15s learning (about 30s) before forwarding — RSTP is much quicker."},{"q":"How large is the 802.1Q VLAN tag inserted into an Ethernet frame?","o":["2 bytes","4 bytes","8 bytes","12 bytes"],"a":1,"e":"The 802.1Q tag adds 4 bytes to the frame to carry VLAN and priority information."},{"q":"How many bits is the VLAN ID field within an 802.1Q tag?","o":["8 bits","10 bits","12 bits","16 bits"],"a":2,"e":"The 12-bit VLAN ID field allows IDs 0–4095 (1–4094 usable)."},{"q":"Lowering a switch's bridge priority makes it more likely to become the:","o":["Designated bridge only","Root bridge","Edge port","Blocking port"],"a":1,"e":"The lowest bridge ID (priority + MAC) becomes root, so a lower priority favors that switch."},{"q":"In RSTP, in addition to root and designated, a port may have which role?","o":["Native","Alternate/backup","Trunk","Access"],"a":1,"e":"RSTP adds alternate and backup port roles that can quickly take over if the active path fails."},{"q":"A voice VLAN allows an IP phone to:","o":["Disable the data port","Tag voice traffic separately while a connected PC uses the data VLAN","Route between subnets","Run DHCP"],"a":1,"e":"Voice VLANs separate phone traffic (often tagged) from the PC's untagged data VLAN on the same port."},{"q":"An access port that receives an 802.1Q-tagged frame for a different VLAN will typically:","o":["Forward it untagged","Drop the frame","Create a trunk","Route it"],"a":1,"e":"Access ports expect untagged frames for their VLAN and drop unexpected tagged frames."},{"q":"The trunk 'allowed VLAN' list controls:","o":["Spanning tree priority","Which VLANs are permitted to cross that trunk","The native VLAN ID","Port speed"],"a":1,"e":"Pruning the allowed list limits which VLANs traverse a trunk, reducing unnecessary traffic."},{"q":"Which device is used to separate broadcast domains?","o":["Hub","Switch (within one VLAN)","Router (or L3 switch with VLANs)","Repeater"],"a":2,"e":"Routers (and Layer 3 switches via separate VLANs/SVIs) bound broadcast domains; a plain switch does not."},{"q":"Rapid MAC address-table flapping is usually a symptom of:","o":["A Layer 2 loop","A DNS failure","An ACL misconfiguration","A bad DHCP scope"],"a":0,"e":"When the same MAC appears on different ports repeatedly, a Layer 2 loop is the likely cause."},{"q":"The purpose of a dedicated management VLAN is to:","o":["Carry all user data","Separate switch management traffic from user traffic","Replace the native VLAN","Run spanning tree faster"],"a":1,"e":"A management VLAN isolates administrative access (SSH/SNMP) from general user VLANs for security."},{"q":"'switchport port-security maximum 1' on a port means:","o":["Allow unlimited MACs","Permit only one MAC address on that port","Disable the port","Allow one VLAN"],"a":1,"e":"It restricts the port to a single learned MAC, triggering a violation if a second appears."},{"q":"A Layer 3 switch differs from a traditional router mainly by:","o":["Lacking any routing","Performing high-speed L3 forwarding in hardware (ASICs) within the LAN","Only supporting one VLAN","Being slower"],"a":1,"e":"Multilayer switches route at wire speed using ASICs, ideal for high-throughput inter-VLAN routing."},{"q":"The primary purpose of link aggregation (LAG) is to:","o":["Encrypt switch traffic","Combine multiple physical links for more bandwidth and redundancy","Assign IP addresses","Prevent VLAN hopping"],"a":1,"e":"LAG bonds several links into one logical link, increasing throughput and surviving a link failure."},{"q":"Which protocol is the open standard (802.3ad) used to negotiate link aggregation?","o":["STP","LACP","ARP","VRRP"],"a":1,"e":"LACP dynamically negotiates and maintains aggregated links between two devices."},{"q":"A switch virtual interface (SVI) is:","o":["A physical uplink port","A virtual Layer 3 interface assigned to a VLAN","A trunk cable","A spanning tree role"],"a":1,"e":"An SVI gives a VLAN a routable Layer 3 interface, used for management or inter-VLAN routing on a Layer 3 switch."},{"q":"A private VLAN is used to:","o":["Merge all VLANs into one","Isolate ports from each other even within the same VLAN/subnet","Disable spanning tree","Increase MTU"],"a":1,"e":"Private VLANs restrict communication between ports in the same subnet, useful for tenant or server isolation."},{"q":"Jumbo frames are Ethernet frames that:","o":["Are smaller than 64 bytes","Carry an MTU larger than the standard 1500 bytes (often ~9000)","Contain no payload","Are always tagged"],"a":1,"e":"Jumbo frames raise the MTU (commonly to 9000 bytes) to move bulk data more efficiently."},{"q":"The standard (default) Ethernet MTU is:","o":["576 bytes","1280 bytes","1500 bytes","9000 bytes"],"a":2,"e":"Standard Ethernet uses a 1500-byte MTU; jumbo frames exceed this."},{"q":"A port operating in half-duplex can:","o":["Send and receive simultaneously","Send or receive, but not at the same time","Only receive","Carry multiple VLANs"],"a":1,"e":"Half-duplex shares the medium so a device transmits or receives one at a time, risking collisions."},{"q":"Auto-negotiation between two Ethernet devices determines:","o":["IP addressing","Link speed and duplex mode","VLAN membership","Spanning tree role"],"a":1,"e":"Auto-negotiation lets two ports agree on the best common speed and duplex."},{"q":"The VLAN database on a switch stores:","o":["MAC-to-IP mappings","The configured VLANs and their IDs/names","Routing tables","ARP entries"],"a":1,"e":"The VLAN database holds the switch's defined VLANs and their identifiers."},{"q":"To avoid errors on a link, speed and duplex settings should be:","o":["Set differently on each end","Matched on both ends of the link","Left at half-duplex","Disabled"],"a":1,"e":"Mismatched speed/duplex causes CRC errors, collisions, and poor throughput, so both ends must agree."},{"q":"The 802.1Q tag added to a frame identifies the frame's:","o":["IP address","VLAN membership","MAC address","Port number"],"a":1,"e":"802.1Q inserts a VLAN ID (and priority) so trunks can carry multiple VLANs."},{"q":"When a switch receives a broadcast frame, it forwards the frame:","o":["Back out the same port","Out all ports except the one it arrived on","Only to the root bridge","To the default gateway only"],"a":1,"e":"Broadcasts are flooded to every port in the VLAN except the ingress port."},{"q":"All ports assigned to the same VLAN share a single:","o":["Collision domain","Broadcast domain","MAC address","IP address"],"a":1,"e":"A VLAN defines one broadcast domain; separating VLANs separates broadcast traffic."},{"q":"A trunk link is typically configured between:","o":["A switch and a single PC","Two switches (or a switch and router) to carry multiple VLANs","Two access ports","A router and a printer"],"a":1,"e":"Trunks carry tagged traffic for many VLANs between infrastructure devices."},{"q":"A mismatched MTU between two devices can cause:","o":["Faster transfers","Fragmentation or dropped (oversized) frames","VLAN hopping","Lower latency"],"a":1,"e":"If one side cannot accept the frame size, packets are fragmented or dropped."},{"q":"Link aggregation improves resiliency because, if one bundled link fails:","o":["The whole bundle goes down","Traffic continues over the remaining links","The switch reboots","All VLANs are deleted"],"a":1,"e":"A LAG keeps forwarding on surviving member links if one fails, avoiding an outage."}]},
{id:"routing",code:"RT3",color:"#34D399",name:"Routing Concepts & Protocols",exam:"Network+ (N10-009)",summary:"Routers connect different networks at Layer 3 and choose the best path using the routing table. Routing can be static (manually configured) or dynamic (learned via protocols such as OSPF, EIGRP, and BGP).",key:["<b>Static vs dynamic:</b> static routes are configured manually (precise, no protocol overhead, but they don’t scale); dynamic routes are learned automatically via protocols like OSPF, EIGRP, and BGP.","<b>Route selection:</b> a router prefers the <b>longest prefix match</b> first; remaining ties are broken by <b>administrative distance</b> (lower = more trusted source) and then the routing <b>metric</b>.","<b>Address translation:</b> <span class='k'>NAT</span> maps private addresses to public ones; <span class='k'>PAT</span> (overload) lets many hosts share one public IP by tracking port numbers.","<b>Redundancy &amp; segmentation:</b> <span class='k'>FHRP</span> (VRRP/HSRP) lets multiple routers share a <b>virtual IP (VIP)</b> as one default gateway; <b>subinterfaces</b> let a single link route multiple VLANs."],q:[{"q":"Two routing protocols each offer a route to the same destination network. Which factor determines the route the router installs?","o":["The higher administrative distance","The lower administrative distance","The protocol with the longer name","Whichever was configured first"],"a":1,"e":"When multiple sources offer the same prefix, the router installs the route from the source with the lower administrative distance (the more trusted source)."},{"q":"OSPF is best classified as which type of routing protocol?","o":["Distance-vector","Link-state","Path-vector","Hybrid proprietary"],"a":1,"e":"OSPF is a link-state protocol: each router builds a full map of the topology and runs the SPF (Dijkstra) algorithm to compute shortest paths."},{"q":"A routing table contains both 10.1.1.0/24 and 10.1.1.0/30 toward different next hops. A packet is destined for 10.1.1.2. Which route is used?","o":["The /24 route","The /30 route","Whichever has the lower metric","Traffic is load-balanced"],"a":1,"e":"Routers always use the longest prefix match. The /30 is more specific and includes 10.1.1.2, so it is preferred over the broader /24."},{"q":"Which protocol is used to route between autonomous systems across the public internet?","o":["ICMP","OSPF","EIGRP","BGP"],"a":3,"e":"BGP is the path-vector exterior gateway protocol that exchanges routing between independent autonomous systems — it is what makes the internet route."},{"q":"How is a default route written in CIDR notation?","o":["255.255.255.255/32","0.0.0.0/0","127.0.0.1/8","224.0.0.0/4"],"a":1,"e":"0.0.0.0/0 matches all destinations and is the catch-all default route."},{"q":"Distance-vector protocols like RIP traditionally share:","o":["Full topology maps (LSAs)","Periodic copies of their routing table with neighbors","Only default routes","MAC address tables"],"a":1,"e":"Distance-vector protocols advertise their entire routing table to directly connected neighbors at intervals."},{"q":"Link-state protocols such as OSPF distribute:","o":["Periodic full tables","Link-State Advertisements describing the topology","Only summary routes","ARP entries"],"a":1,"e":"Link-state routers flood LSAs so every router builds an identical topology database and runs SPF."},{"q":"Administrative distance is used to:","o":["Choose the best path within one protocol","Choose between routes learned from different sources","Set the TTL","Assign VLANs"],"a":1,"e":"AD ranks the trustworthiness of route sources; the metric then chooses the best path within a single protocol."},{"q":"What does the IP TTL field accomplish during routing?","o":["Sets bandwidth","Decrements at each hop and drops the packet at 0 to prevent loops","Encrypts the payload","Defines the subnet"],"a":1,"e":"Each router decrements TTL by one; when it reaches zero the packet is discarded, preventing endless loops."},{"q":"RIPv2 improves on RIPv1 primarily by supporting:","o":["Link-state operation","Classless routing/VLSM with masks in updates","A 255-hop limit","Encryption by default"],"a":1,"e":"RIPv2 is classless and includes subnet masks in its updates, supporting VLSM (RIPv1 was classful)."},{"q":"What does network convergence mean?","o":["All links are encrypted","All routers share a consistent view of the topology/routes","Two networks are merged","The default gateway changes"],"a":1,"e":"Convergence is the state where every router has updated and agreed-upon routing information after a change."},{"q":"If a router has no matching route and no default route, an arriving packet is:","o":["Broadcast to all interfaces","Dropped","Sent to the nearest neighbor","Queued until a route appears"],"a":1,"e":"With no matching or default route, the router drops the packet (often returning an ICMP destination unreachable)."},{"q":"Which protocol is a classless link-state interior gateway protocol (IGP)?","o":["ICMP","OSPF","BGP","EIGRP"],"a":1,"e":"OSPF is a classless link-state protocol that uses areas (with Area 0 as the backbone) for scalability."},{"q":"BGP selects paths primarily using:","o":["Hop count","Path attributes such as AS-path","Bandwidth only","Administrative distance only"],"a":1,"e":"BGP is a path-vector protocol that chooses routes using attributes like AS-path, local preference, and MED."},{"q":"Route summarization (aggregation) reduces:","o":["Link speed","Routing table size and update overhead","The number of VLANs","Administrative distance"],"a":1,"e":"Summarizing many specific routes into one prefix shrinks routing tables and limits update churn."},{"q":"Asymmetric routing occurs when:","o":["Both directions use the same path","Traffic takes different paths to and from a destination","Routing is disabled","Two routers share an IP"],"a":1,"e":"Asymmetric routing means forward and return traffic traverse different paths, which can complicate stateful devices."},{"q":"A complete static route configuration requires the destination network, mask, and:","o":["A VLAN ID","A next-hop IP or exit interface","An ACL","A hostname"],"a":1,"e":"You must specify where to send matching traffic: a next-hop address or outgoing interface."},{"q":"BGP is classified as which type of routing protocol?","o":["Interior gateway protocol (IGP)","Exterior gateway protocol (EGP)","Link-state IGP","Distance-vector IGP"],"a":1,"e":"BGP is the exterior gateway protocol used to route between autonomous systems."},{"q":"On a typical edge router, a default static route points toward:","o":["The loopback","The ISP / next-hop gateway","The DHCP server","Another internal VLAN"],"a":1,"e":"The default route forwards all unknown-destination traffic to the upstream ISP gateway."},{"q":"A route configured with an administrative distance of 255 is:","o":["The most preferred","Considered unusable and not installed","A default route","A summary route"],"a":1,"e":"AD 255 marks a route as unreachable, so it is never placed in the routing table."},{"q":"The purpose of a First Hop Redundancy Protocol (FHRP) is to:","o":["Encrypt routing updates","Let multiple routers act as a single, redundant default gateway","Assign IP addresses to hosts","Tag VLAN traffic"],"a":1,"e":"FHRP (e.g., VRRP/HSRP) provides a redundant default gateway so hosts stay connected if one router fails."},{"q":"VRRP is best described as:","o":["A Cisco-proprietary protocol","An open-standard First Hop Redundancy Protocol","A switching protocol","An encryption standard"],"a":1,"e":"Virtual Router Redundancy Protocol is the vendor-neutral, industry-standard FHRP."},{"q":"HSRP is:","o":["An open IETF standard","A Cisco-proprietary First Hop Redundancy Protocol","A routing metric","A VLAN tagging method"],"a":1,"e":"Hot Standby Router Protocol is Cisco's proprietary FHRP; VRRP is the open-standard equivalent."},{"q":"A virtual IP (VIP) in an FHRP setup is:","o":["The MAC of the switch","An IP address not tied to one physical device that can move between routers","A multicast group","A public DNS record"],"a":1,"e":"Hosts point to the VIP as their gateway; it can shift to a standby router without reconfiguring clients."},{"q":"A subinterface is:","o":["A backup power supply","A logical division of one physical interface into multiple virtual interfaces","A type of cable","A spanning tree port"],"a":1,"e":"Subinterfaces let a single physical link carry multiple IP subnets/VLANs (e.g., router-on-a-stick)."},{"q":"Router-on-a-stick performs inter-VLAN routing by using:","o":["Multiple physical routers","Subinterfaces on one trunked router interface, one per VLAN","A separate switch per VLAN","Spanning tree"],"a":1,"e":"One router interface is trunked and divided into subinterfaces, each routing a different VLAN."},{"q":"Network Address Translation (NAT) primarily:","o":["Encrypts traffic","Translates private IP addresses to public ones","Assigns MAC addresses","Builds VLANs"],"a":1,"e":"NAT lets hosts with private addresses communicate over the public internet, conserving public IPv4."},{"q":"Port Address Translation (PAT) allows:","o":["One host per public IP","Many internal hosts to share one public IP using unique port numbers","Encryption of all traffic","Dynamic VLAN assignment"],"a":1,"e":"PAT (NAT overload) multiplexes many private hosts onto a single public IP by tracking source ports."},{"q":"Static NAT provides:","o":["A pool of shared addresses","A fixed one-to-one mapping between a private and a public address","Automatic IP assignment","Load balancing"],"a":1,"e":"Static NAT permanently maps one private IP to one public IP, often for an internet-facing server."},{"q":"Dynamic NAT works by:","o":["Mapping private IPs to a pool of public IPs as needed","Using one public IP for everyone","Assigning MAC addresses","Encrypting packets"],"a":0,"e":"Dynamic NAT draws from a pool of public addresses, assigning them to internal hosts on demand."},{"q":"NAT64 is a transition technology that:","o":["Doubles bandwidth","Lets IPv6-only hosts communicate with IPv4 resources","Encrypts IPv6","Replaces DHCP"],"a":1,"e":"NAT64 translates between IPv6 and IPv4 so IPv6-only clients can reach IPv4-only services."},{"q":"A default route (0.0.0.0/0) is used when:","o":["A more specific route exists","No more specific route matches the destination","The link is down","NAT is enabled"],"a":1,"e":"The default route is the catch-all path used for any destination not matched by a specific route."},{"q":"In a routing table, the 'next hop' refers to:","o":["The final destination host","The IP address of the next router toward the destination","The source interface","The VLAN ID"],"a":1,"e":"The next hop is the adjacent router a packet is forwarded to on its way to the destination network."},{"q":"A typical routing table entry includes the destination network, a metric, and:","o":["A MAC address only","A next-hop address or exit interface","A VLAN tag","An SSID"],"a":1,"e":"Each route lists where to send matching traffic (next hop/exit interface) along with its metric."},{"q":"A directly connected route appears in the routing table when:","o":["A neighbor advertises it","An interface is configured with an IP and is up","NAT is enabled","STP converges"],"a":1,"e":"Routers automatically install connected routes for the subnets on their active, addressed interfaces."},{"q":"A lower administrative distance indicates that the route source is:","o":["Less reliable","More trusted and therefore preferred","Slower","Encrypted"],"a":1,"e":"Administrative distance ranks trustworthiness of route sources; the lower value is installed."},{"q":"A routing metric represents:","o":["The encryption level","The cost or desirability of a path (e.g., bandwidth, hop count)","The VLAN number","The MAC address"],"a":1,"e":"Within a protocol, the metric is used to choose the best path among several to the same network."},{"q":"Static routing is best suited for:","o":["Large, constantly changing networks","Small or stub networks with few, stable paths","Networks needing automatic failover","Wireless meshes"],"a":1,"e":"Static routes are precise and overhead-free but must be edited by hand, so they fit small/stub networks."},{"q":"A key advantage of dynamic routing is that routers:","o":["Never need configuration","Automatically adapt to topology changes","Use no CPU or bandwidth","Cannot form loops"],"a":1,"e":"Dynamic protocols share reachability and reconverge automatically when links change."},{"q":"Compared with distance-vector protocols, link-state protocols like OSPF:","o":["Only know their neighbors' rumors","Build a complete map of the network topology","Cannot scale","Use hop count only"],"a":1,"e":"Link-state routers each build a full topology database and compute shortest paths from it."},{"q":"An autonomous system (AS) is:","o":["A single switch","A collection of networks under one administrative control","A type of VLAN","A cabling standard"],"a":1,"e":"An AS is a routing domain under unified control, identified by an AS number; BGP routes between ASes."},{"q":"EIGRP is best described as:","o":["An open link-state protocol","A Cisco advanced distance-vector (hybrid) routing protocol","An exterior gateway protocol","A switching protocol"],"a":1,"e":"EIGRP is Cisco's advanced distance-vector protocol; Network+ expects awareness of it, not its internals."},{"q":"In an FHRP group, if the active router fails:","o":["All hosts lose connectivity permanently","A standby router takes over the shared virtual IP, keeping hosts online","Every host must be reconfigured","The switch reboots"],"a":1,"e":"FHRP failover moves the VIP to a standby router transparently, preserving the default gateway."},{"q":"The fundamental purpose of a routing protocol is to:","o":["Assign IP addresses","Dynamically share reachability so routers learn paths to remote networks","Encrypt traffic","Tag VLANs"],"a":1,"e":"Routing protocols exchange network information so routers can build and update their routing tables."},{"q":"A switch virtual interface (SVI) enables a Layer 3 switch to:","o":["Encrypt VLAN traffic","Route between VLANs by giving each VLAN a Layer 3 interface","Disable spanning tree","Provide PoE"],"a":1,"e":"Assigning an SVI per VLAN lets a multilayer switch route traffic between those VLANs."},{"q":"PAT is also commonly referred to as:","o":["Static NAT","NAT overload","Dynamic routing","Port mirroring"],"a":1,"e":"Because many hosts overload a single public IP using ports, PAT is called NAT overload."},{"q":"When a host needs to reach a device on a different subnet, it sends the packet to its:","o":["DNS server","Default gateway","DHCP server","Nearest switch"],"a":1,"e":"Off-subnet traffic is forwarded to the configured default gateway (a router) for routing."},{"q":"A /32 route represents:","o":["An entire Class A network","A single specific host (the most specific route possible)","A default route","A multicast group"],"a":1,"e":"A /32 prefix matches exactly one host address; longest-prefix match always prefers it."},{"q":"GLBP differs from a basic FHRP in that it also provides:","o":["Encryption","Load balancing across multiple routers","VLAN tagging","DNS resolution"],"a":1,"e":"Gateway Load Balancing Protocol is an FHRP that distributes traffic across several gateways, not just failover."},{"q":"The main drawback of static routing is that it:","o":["Uses too much bandwidth","Must be updated manually and does not scale to large networks","Cannot reach the internet","Creates routing loops automatically"],"a":1,"e":"Static routes require manual maintenance for every change, which becomes unmanageable as networks grow."}]},
{id:"services",code:"SVC",color:"#A78BFA",name:"Network Services: DHCP, DNS, NAT",exam:"Network+ (N10-009)",summary:"Core services keep networks usable: DHCP automates addressing, DNS resolves names to IPs, and NAT lets private hosts share public addresses. Troubleshooting these is a daily reality.",key:["<b>DHCP DORA:</b> <span class='k'>Discover</span> → <span class='k'>Offer</span> → <span class='k'>Request</span> → <span class='k'>Acknowledge</span>. A relay/IP helper forwards DHCP across subnets since the initial broadcast can't be routed.","<b>DNS records:</b> <span class='k'>A</span> = IPv4, <span class='k'>AAAA</span> = IPv6, <span class='k'>CNAME</span> = alias, <span class='k'>MX</span> = mail, <span class='k'>PTR</span> = reverse, <span class='k'>NS</span> = name server, <span class='k'>TXT</span> = SPF/verification.","<b>NAT types:</b> Static (1:1), Dynamic (pool), and <b>PAT / NAT overload</b> (many private hosts → one public IP, distinguished by port). PAT is what home routers use.","Symptom check: <i>can ping by IP but not by name</i> = DNS problem; <i>no IP at all / 169.254 address</i> = DHCP problem."],q:[{"q":"What is the correct sequence of the DHCP lease process?","o":["Discover, Request, Offer, Acknowledge","Offer, Discover, Acknowledge, Request","Discover, Offer, Request, Acknowledge","Request, Offer, Discover, Acknowledge"],"a":2,"e":"DORA: the client broadcasts Discover, the server sends an Offer, the client sends a Request for that offer, and the server replies with an Acknowledge."},{"q":"A user can reach websites by IP address but not by domain name. What is the most likely problem?","o":["The default gateway is down","DNS resolution is failing","The DHCP lease expired","The NIC is disabled"],"a":1,"e":"If IP connectivity works but names don't resolve, the issue is DNS — the service that translates hostnames into IP addresses."},{"q":"Which type of NAT allows many internal hosts to share a single public IP using port numbers?","o":["Static NAT","Dynamic NAT","PAT (NAT overload)","Twice NAT"],"a":2,"e":"PAT (Port Address Translation), also called NAT overload, maps many private addresses to one public IP and tracks each conversation by source port. This is what typical home/office routers do."},{"q":"Which DNS record maps a hostname to an IPv6 address?","o":["A","AAAA","CNAME","MX"],"a":1,"e":"An AAAA ('quad-A') record points a name to an IPv6 address. An A record is for IPv4."},{"q":"DHCP clients on a remote subnet aren't getting addresses from the central server. What feature forwards their requests?","o":["A DNS forwarder","An IP helper address / DHCP relay","A trunk port","A static route"],"a":1,"e":"Because the initial DHCP Discover is a broadcast that routers don't forward, you configure an IP helper-address (DHCP relay) to unicast those requests to the server."},{"q":"What does a DNS MX record specify?","o":["A mail server for the domain","An alias for another name","A reverse lookup pointer","An IPv4 address"],"a":0,"e":"An MX (Mail Exchange) record identifies the mail server(s) responsible for receiving email for the domain, with priority values."},{"q":"In DHCP, what is a scope?","o":["A single reserved address","The pool/range of addresses a server can lease","The DNS suffix","The lease timer"],"a":1,"e":"A DHCP scope defines the range of IP addresses (and options) available for assignment on a subnet."},{"q":"A DHCP reservation does what?","o":["Blocks an address","Permanently ties a specific IP to a device's MAC address","Sets the lease to zero","Disables DHCP"],"a":1,"e":"A reservation always assigns the same IP to a given MAC address while still using DHCP."},{"q":"A DHCP client typically attempts to renew its lease at approximately:","o":["10% of the lease","50% of the lease (T1)","100% of the lease","Never"],"a":1,"e":"At ~50% (T1) the client unicasts a renewal to its server; at ~87.5% (T2) it broadcasts to any server."},{"q":"Which DNS record maps a hostname to an IPv4 address?","o":["A","AAAA","CNAME","MX"],"a":0,"e":"An A record points a hostname to an IPv4 address (AAAA is the IPv6 equivalent)."},{"q":"Which DNS record is an alias pointing one name to another name?","o":["A","PTR","CNAME","NS"],"a":2,"e":"A CNAME (canonical name) record aliases one hostname to another, which then resolves to an address."},{"q":"Which DNS record performs reverse resolution, mapping an IP to a name?","o":["A","AAAA","PTR","TXT"],"a":2,"e":"A PTR record maps an IP address back to a hostname (used in reverse lookup zones)."},{"q":"Which DNS record identifies the authoritative name servers for a domain?","o":["NS","MX","SOA","TXT"],"a":0,"e":"NS (name server) records list the authoritative DNS servers for a zone."},{"q":"TXT records are commonly used for:","o":["Routing email","Email authentication like SPF and DKIM","Reverse lookups","Time sync"],"a":1,"e":"TXT records hold arbitrary text and are widely used for SPF, DKIM, and domain ownership verification."},{"q":"The SOA record in a DNS zone contains:","o":["A list of hosts","Zone authority info such as the serial number and refresh timers","The default gateway","VLAN assignments"],"a":1,"e":"The Start of Authority record holds the primary server, admin contact, serial number, and timing parameters for a zone."},{"q":"In a recursive DNS query, the resolver:","o":["Returns a referral and stops","Does all the work and returns the final answer to the client","Only checks its cache","Queries the client"],"a":1,"e":"With recursion, the resolver follows the chain of referrals itself and returns the complete answer to the client."},{"q":"The DNS record TTL controls:","o":["How long a record is cached before re-querying","The hop limit","The lease duration","The zone size"],"a":0,"e":"TTL specifies how long resolvers may cache a record before they must query again."},{"q":"Static NAT provides what kind of mapping?","o":["Many-to-one using ports","A fixed one-to-one private-to-public mapping","A pool of dynamic addresses","No mapping"],"a":1,"e":"Static NAT permanently maps one private address to one public address, often used for inbound servers."},{"q":"Dynamic NAT assigns addresses from:","o":["A single public IP via ports","A pool of public addresses on demand","The DHCP scope","The routing table"],"a":1,"e":"Dynamic NAT maps private hosts to public addresses pulled from a configured pool, first-come first-served."},{"q":"The primary reason NAT/PAT became widespread is to:","o":["Speed up DNS","Conserve scarce public IPv4 addresses","Encrypt traffic","Replace routing"],"a":1,"e":"NAT lets many private hosts share a few (or one) public IPv4 addresses, easing IPv4 exhaustion."},{"q":"A workstation shows an address of 169.254.20.5. Which service most likely failed?","o":["DNS","DHCP","NTP","SNMP"],"a":1,"e":"169.254.x.x is APIPA, self-assigned when no DHCP server could be reached."},{"q":"A forward lookup zone resolves:","o":["IP to name","Name to IP","MAC to IP","Port to service"],"a":1,"e":"Forward lookup zones translate hostnames into IP addresses; reverse zones do the opposite."},{"q":"Which port does DNS use for zone transfers between servers?","o":["UDP 53","TCP 53","TCP 853","UDP 123"],"a":1,"e":"Zone transfers and large responses use TCP 53, while ordinary lookups use UDP 53."},{"q":"DHCP option codes 3 and 6 provide which settings?","o":["Lease time and domain name","Default gateway and DNS server","Subnet mask and broadcast","NTP and TFTP servers"],"a":1,"e":"Option 3 sets the default gateway (router) and option 6 sets the DNS server(s)."},{"q":"A DNS cache poisoning attack works by:","o":["Flooding a switch","Inserting forged records into a resolver's cache","Spoofing ARP","Exhausting a DHCP scope"],"a":1,"e":"Cache poisoning tricks a resolver into storing a false record, sending victims to a malicious IP."},{"q":"Split (split-brain) DNS is used to:","o":["Provide different answers to internal vs external clients","Double the cache size","Replace DHCP","Disable recursion"],"a":0,"e":"Split DNS returns different responses depending on whether the query comes from inside or outside the network."},{"q":"During the DHCP process, which message does the client first send as a broadcast?","o":["DHCP Offer","DHCP Discover","DHCP Request","DHCP Ack"],"a":1,"e":"The client broadcasts a DHCP Discover to locate available servers."},{"q":"Which DHCP message confirms and finalizes the lease to the client?","o":["DHCP Discover","DHCP Offer","DHCP Request","DHCP Ack"],"a":3,"e":"The server's DHCP Ack (DHCPACK) confirms the lease and parameters to the client."},{"q":"At approximately what point does DHCP rebinding (T2) occur?","o":["10% of the lease","50% of the lease","87.5% of the lease","At expiry only"],"a":2,"e":"At ~87.5% (T2) the client broadcasts to any available server if renewal with the original server failed."},{"q":"Which DHCP option specifies the lease time?","o":["Option 3","Option 6","Option 15","Option 51"],"a":3,"e":"DHCP option 51 sets the IP address lease time."},{"q":"Which DHCP option provides the domain name to clients?","o":["Option 3","Option 6","Option 15","Option 51"],"a":2,"e":"Option 15 conveys the DNS domain name; option 3 is the gateway and option 6 the DNS servers."},{"q":"If two DHCP servers serve the same scope without coordination, the likely result is:","o":["Faster leasing","IP address conflicts/overlap","Better redundancy automatically","Encrypted leases"],"a":1,"e":"Uncoordinated overlapping scopes hand out duplicate addresses; split-scope or failover prevents this."},{"q":"At the very top of the DNS hierarchy is the:","o":["Top-level domain","Root (.) zone","Authoritative server","Recursive resolver"],"a":1,"e":"The root zone (.) sits at the top, delegating to top-level domains like .com."},{"q":"A fully qualified domain name (FQDN) includes:","o":["Only the hostname","The host plus full domain path to the root","Just the TLD","An IP address"],"a":1,"e":"An FQDN specifies the complete path, e.g., host.example.com (with an implied trailing root)."},{"q":"An SRV record is used to:","o":["Map a name to IPv4","Locate services such as SIP or LDAP by protocol and port","Reverse-resolve an IP","Hold SPF text"],"a":1,"e":"SRV records advertise the host and port for specific services, used by SIP, LDAP, and others."},{"q":"An authoritative DNS server is one that:","o":["Only caches answers","Holds the actual zone records for a domain","Forwards all queries","Runs DHCP"],"a":1,"e":"An authoritative server is the definitive source of records for the zones it hosts."},{"q":"DNS round-robin provides basic load distribution by:","o":["Encrypting queries","Returning multiple A records in rotating order","Blocking queries","Using anycast only"],"a":1,"e":"Round-robin rotates among several A records so clients spread across multiple servers."},{"q":"A DNS 'glue record' is:","o":["A reverse pointer","An A record for a name server inside the zone it serves","An SPF entry","A CNAME chain"],"a":1,"e":"Glue records provide the IP of an in-zone name server to break the otherwise circular delegation."},{"q":"Port forwarding (destination NAT) is used to:","o":["Hide internal hosts only","Direct inbound traffic on a specific port to an internal host","Assign DHCP leases","Resolve names"],"a":1,"e":"Port forwarding maps an external port to an internal server so inbound connections reach it through NAT."},{"q":"IPv4 reverse DNS lookups use which special domain?","o":["ip6.arpa","in-addr.arpa","reverse.net","arpa.local"],"a":1,"e":"IPv4 PTR records live under in-addr.arpa; IPv6 uses ip6.arpa."},{"q":"IPv6 reverse DNS lookups use which domain?","o":["in-addr.arpa","ip6.arpa","v6.arpa","rev6.net"],"a":1,"e":"IPv6 reverse resolution is performed under the ip6.arpa domain."},{"q":"DNSSEC primarily provides:","o":["Faster lookups","Authentication and integrity of DNS data via digital signatures","Encryption of all queries","Load balancing"],"a":1,"e":"DNSSEC signs records so resolvers can verify authenticity and integrity (it does not encrypt the data)."},{"q":"Multicast DNS (mDNS), used for names like .local, relies on:","o":["A central server","Multicast on the local link","TCP 53 only","BGP"],"a":1,"e":"mDNS resolves names using link-local multicast without a dedicated DNS server."},{"q":"A DHCP starvation attack works by:","o":["Spoofing DNS records","Flooding the server with requests to exhaust the address pool","Poisoning ARP","Tagging VLANs"],"a":1,"e":"By rapidly requesting many addresses (often spoofed), an attacker drains the scope so legitimate clients fail."},{"q":"A DHCP lease is best defined as:","o":["A permanent IP assignment","A time-bounded assignment of an IP to a client","A static route","A DNS record"],"a":1,"e":"Leases grant an address for a limited time, after which it must be renewed or returned to the pool."},{"q":"In NTP, a stratum 1 server is one that:","o":["Has no time source","Synchronizes directly to a stratum 0 reference clock","Is always wrong","Uses DHCP"],"a":1,"e":"Stratum 0 is the reference clock (GPS/atomic); stratum 1 servers sync directly to it, and so on down."},{"q":"Anycast DNS improves resilience by:","o":["Using one server only","Advertising the same IP from multiple locations and routing to the nearest","Encrypting zones","Disabling caching"],"a":1,"e":"Anycast lets many servers share an address; queries reach the closest instance, improving speed and DDoS resistance."},{"q":"Dynamic DNS (DDNS) allows:","o":["Manual zone edits only","Clients to automatically register/update their DNS records","DHCP to be disabled","Static NAT"],"a":1,"e":"DDNS updates DNS records automatically as hosts obtain or change addresses (common with DHCP integration)."},{"q":"A caching-only DNS server:","o":["Hosts authoritative zones","Resolves and caches answers but hosts no zones of its own","Only does reverse lookups","Assigns IP addresses"],"a":1,"e":"A caching-only resolver answers and stores results for clients without being authoritative for any domain."},{"q":"A DHCP 'exclusion range' is used to:","o":["Expand the scope","Reserve addresses within a scope from being handed out","Set the lease time","Define the gateway"],"a":1,"e":"Exclusions keep specific addresses (e.g., for statically assigned servers) out of the DHCP assignment pool."}]},
{id:"wireless",code:"RF",color:"#38BDF8",name:"Wireless Networking",exam:"Network+ (N10-009)",summary:"Wi-Fi operates on shared radio spectrum governed by 802.11 standards. Channel planning, band selection, and modern security (WPA2/WPA3) are key knowledge areas.",key:["<b>Bands:</b> 2.4 GHz = longer range, more interference, fewer channels. 5 GHz = faster, shorter range, more channels. Wi-Fi 6E adds the clean 6 GHz band.","<b>2.4 GHz non-overlapping channels:</b> <span class='k'>1, 6, 11</span> only. Overlap causes co-channel interference.","<b>Standards:</b> 802.11n (Wi-Fi 4, MIMO), 802.11ac (Wi-Fi 5, 5 GHz, MU-MIMO), 802.11ax (Wi-Fi 6, OFDMA, both bands).","<b>Security:</b> <b>WPA2</b> uses AES/CCMP; <b>WPA3</b> uses SAE (replacing the weak PSK handshake). Avoid WEP and TKIP entirely."],q:[{"q":"Which three channels are non-overlapping in the 2.4 GHz band?","o":["1, 5, 9","1, 6, 11","2, 7, 12","1, 4, 8"],"a":1,"e":"Only channels 1, 6, and 11 do not overlap in the 2.4 GHz band, so they're used to avoid co-channel interference in dense deployments."},{"q":"Which wireless security standard introduced SAE to replace the pre-shared key handshake?","o":["WEP","WPA","WPA2","WPA3"],"a":3,"e":"WPA3 uses Simultaneous Authentication of Equals (SAE), which protects against offline dictionary attacks that affected WPA2's PSK handshake."},{"q":"A user complains of slow Wi-Fi in a crowded office. Moving them from 2.4 GHz to 5 GHz typically helps because:","o":["5 GHz travels farther","5 GHz has more non-overlapping channels and less interference","5 GHz uses less power","2.4 GHz is encrypted and 5 GHz is not"],"a":1,"e":"The 5 GHz band offers many more non-overlapping channels and suffers less interference from legacy devices, generally improving throughput in dense areas (at the cost of range)."},{"q":"Which 802.11 standard is also known as Wi-Fi 6 and introduced OFDMA?","o":["802.11n","802.11ac","802.11ax","802.11g"],"a":2,"e":"802.11ax (Wi-Fi 6) added OFDMA for efficient multi-client use and operates on both 2.4 and 5 GHz; Wi-Fi 6E extends it to 6 GHz."},{"q":"Which encryption standard does WPA2 use to secure data?","o":["WEP","TKIP only","AES (CCMP)","RC4"],"a":2,"e":"WPA2 mandates AES via CCMP for strong encryption. TKIP was a transitional WPA mechanism and is now considered weak."},{"q":"Compared to 5 GHz, the 2.4 GHz band generally offers:","o":["Greater range but more interference","Less range and more channels","Higher maximum throughput","No support for legacy devices"],"a":0,"e":"2.4 GHz signals penetrate walls and travel farther than 5 GHz, but the band is crowded (Bluetooth, microwaves, neighbors) and has only three usable channels."},{"q":"The 802.11a standard operates in which band at up to 54 Mbps?","o":["2.4 GHz","5 GHz","6 GHz","900 MHz"],"a":1,"e":"802.11a runs in the 5 GHz band at up to 54 Mbps."},{"q":"The 802.11b standard operates at what maximum data rate?","o":["11 Mbps","54 Mbps","150 Mbps","600 Mbps"],"a":0,"e":"802.11b operates in 2.4 GHz at up to 11 Mbps."},{"q":"The 802.11g standard operates in which band?","o":["5 GHz","2.4 GHz","6 GHz","Both 2.4 and 5"],"a":1,"e":"802.11g runs in 2.4 GHz at up to 54 Mbps, remaining backward compatible with 802.11b."},{"q":"802.11n is also marketed as which Wi-Fi generation?","o":["Wi-Fi 4","Wi-Fi 5","Wi-Fi 6","Wi-Fi 6E"],"a":0,"e":"802.11n is Wi-Fi 4; it introduced MIMO and operates on both 2.4 and 5 GHz."},{"q":"802.11ac is marketed as which Wi-Fi generation?","o":["Wi-Fi 4","Wi-Fi 5","Wi-Fi 6","Wi-Fi 6E"],"a":1,"e":"802.11ac is Wi-Fi 5, a 5 GHz standard that added wider channels and MU-MIMO."},{"q":"Wi-Fi 6E extends Wi-Fi 6 into which additional band?","o":["900 MHz","2.4 GHz","5 GHz","6 GHz"],"a":3,"e":"Wi-Fi 6E adds the 6 GHz band, providing more clean spectrum and wide channels."},{"q":"What is an SSID?","o":["A security key","The wireless network name","A MAC address","A channel number"],"a":1,"e":"The SSID (Service Set Identifier) is the broadcast name that identifies a wireless network."},{"q":"WPA2-Enterprise differs from WPA2-Personal by using:","o":["A shared passphrase","802.1X authentication with a RADIUS server","No encryption","WEP keys"],"a":1,"e":"Enterprise mode authenticates each user via 802.1X/RADIUS rather than a single shared pre-shared key."},{"q":"Why is WEP considered insecure?","o":["It uses AES","Its weak RC4 implementation and IV reuse are easily cracked","It requires RADIUS","It only works on 5 GHz"],"a":1,"e":"WEP's flawed RC4 key/IV handling allows attackers to recover keys quickly; it must not be used."},{"q":"What does MIMO provide in modern Wi-Fi?","o":["A single antenna stream","Multiple antennas and spatial streams for higher throughput","Encryption","Channel bonding only"],"a":1,"e":"MIMO (Multiple Input Multiple Output) uses several antennas/spatial streams to boost throughput and reliability."},{"q":"Wireless networks use which media access method?","o":["CSMA/CD","CSMA/CA","Token passing","Polling only"],"a":1,"e":"Wi-Fi uses CSMA/CA (collision avoidance) because stations cannot reliably detect collisions on the medium."},{"q":"The hidden node problem is mitigated by:","o":["Disabling encryption","RTS/CTS handshaking","Lowering the SSID","Using WEP"],"a":1,"e":"RTS/CTS reserves the medium before transmission so stations that cannot hear each other avoid collisions."},{"q":"Why do 2.4 GHz channels overlap?","o":["They are 100 MHz wide","Channels are spaced 5 MHz apart but each is about 20 MHz wide","There is only one channel","They use different bands"],"a":1,"e":"Because each channel is ~20 MHz wide but centers are only 5 MHz apart, adjacent channels overlap — leaving 1, 6, 11 as non-overlapping."},{"q":"What does RSSI measure?","o":["Encryption strength","Received signal strength","Channel width","SSID count"],"a":1,"e":"RSSI (Received Signal Strength Indicator) reflects how strong a received wireless signal is at the client."},{"q":"A captive portal is used to:","o":["Encrypt the backbone","Present a web page for guest authentication or acceptance","Assign VLANs","Bond channels"],"a":1,"e":"Captive portals intercept new clients and require login or terms acceptance before granting internet access."},{"q":"A wireless site survey is performed to:","o":["Configure VLANs","Plan AP placement, coverage, and channel reuse","Replace DHCP","Test fiber"],"a":1,"e":"A site survey maps signal coverage and interference to optimize AP placement and channel planning."},{"q":"Increasing channel width from 20 MHz to 80 MHz generally:","o":["Reduces throughput","Increases throughput but raises interference and reduces usable channels","Has no effect","Disables MIMO"],"a":1,"e":"Wider channels carry more data but consume more spectrum, increasing interference and limiting channel reuse."},{"q":"For roaming, multiple access points should share the same:","o":["Channel","SSID","MAC address","IP address"],"a":1,"e":"A common SSID across APs lets clients roam seamlessly between coverage areas."},{"q":"Band steering encourages capable clients toward which band?","o":["2.4 GHz","5 GHz","900 MHz","The slowest available"],"a":1,"e":"Band steering nudges dual-band clients onto the less congested, higher-throughput 5 GHz band."},{"q":"WPA3-Personal protects the passphrase exchange using:","o":["TKIP","SAE (Simultaneous Authentication of Equals)","WEP","Open authentication"],"a":1,"e":"WPA3 uses SAE, which resists offline dictionary attacks and provides forward secrecy."},{"q":"Wi-Fi 6 (802.11ax) supports a theoretical maximum throughput of about:","o":["54 Mbps","600 Mbps","3.5 Gbps","9.6 Gbps"],"a":3,"e":"802.11ax tops out around 9.6 Gbps in ideal multi-stream conditions."},{"q":"MU-MIMO allows an access point to:","o":["Use a single antenna","Serve multiple clients simultaneously","Disable encryption","Reduce channel width"],"a":1,"e":"Multi-User MIMO lets an AP transmit to several clients at once rather than one at a time."},{"q":"OFDMA improves efficiency by:","o":["Widening every channel","Dividing a channel into resource units shared among clients at once","Disabling MIMO","Encrypting frames"],"a":1,"e":"OFDMA splits a channel into resource units so multiple clients can be served in the same transmission."},{"q":"Beamforming improves performance by:","o":["Broadcasting equally in all directions","Focusing the signal toward a specific client","Lowering transmit power to zero","Encrypting the SSID"],"a":1,"e":"Beamforming shapes the antenna pattern toward a client, improving signal quality and range."},{"q":"In the 5 GHz band, which feature avoids interfering with radar systems?","o":["MU-MIMO","DFS (Dynamic Frequency Selection)","WPS","Band steering"],"a":1,"e":"DFS detects radar and moves the AP to another channel to avoid interference."},{"q":"A BSSID is:","o":["The network name","The MAC address of an AP's radio","An encryption key","A channel number"],"a":1,"e":"The BSSID identifies a basic service set and is typically the AP radio's MAC address."},{"q":"An Extended Service Set (ESS) is:","o":["A single AP","Multiple APs sharing one SSID for seamless coverage","An ad hoc network","A wired backbone"],"a":1,"e":"An ESS links multiple BSSs under one SSID so clients roam across a larger area."},{"q":"An ad hoc (IBSS) wireless network is one that:","o":["Requires a controller","Connects devices directly without an access point","Uses only 6 GHz","Has no encryption option"],"a":1,"e":"In ad hoc/IBSS mode, devices communicate peer-to-peer with no infrastructure AP."},{"q":"Lightweight (controller-based) access points are managed by a:","o":["DHCP server","Wireless LAN Controller (WLC)","DNS server","Layer 2 switch only"],"a":1,"e":"Lightweight APs rely on a WLC for configuration, RF management, and policy."},{"q":"Which protocol is used between a WLAN controller and its lightweight APs?","o":["CAPWAP","SNMP","RADIUS","CDP"],"a":0,"e":"CAPWAP (Control And Provisioning of Wireless Access Points) tunnels control and data between the WLC and APs."},{"q":"The unit dBm measures:","o":["Channel width","Absolute signal power (logarithmic)","Encryption strength","Data rate"],"a":1,"e":"dBm expresses signal power relative to one milliwatt; less-negative values mean a stronger signal."},{"q":"For wireless signal quality, a higher signal-to-noise ratio (SNR) is:","o":["Worse","Better","Irrelevant","Only relevant on wired links"],"a":1,"e":"A higher SNR means the signal is well above the noise floor, giving better, faster connections."},{"q":"A wireless coverage gap (dead zone) is best resolved by:","o":["Lowering all AP power","Adding or repositioning access points","Disabling the SSID","Switching to WEP"],"a":1,"e":"Filling coverage holes typically requires additional APs or relocating existing ones."},{"q":"Co-channel interference occurs when:","o":["APs use non-overlapping channels","Nearby APs operate on the same channel","Clients use 5 GHz","Encryption is enabled"],"a":1,"e":"APs sharing a channel must contend for airtime, reducing throughput (co-channel interference)."},{"q":"Adjacent-channel interference is caused by:","o":["Identical channels","Overlapping channels (e.g., 1 and 3 on 2.4 GHz)","Fiber cabling","High SNR"],"a":1,"e":"Overlapping channels bleed into each other, so 2.4 GHz designs stick to 1, 6, and 11."},{"q":"The KRACK vulnerability targets which mechanism?","o":["The WPA2 4-way handshake","DNS resolution","DHCP leasing","STP"],"a":0,"e":"KRACK (Key Reinstallation Attack) exploited weaknesses in the WPA2 4-way handshake."},{"q":"An evil twin attack involves:","o":["A duplicate IP address","A rogue AP impersonating a legitimate SSID","A flooded switch","A poisoned DNS cache"],"a":1,"e":"An evil twin mimics a trusted SSID to lure clients and intercept their traffic."},{"q":"A deauthentication attack works by:","o":["Encrypting client traffic","Spoofing deauth frames to force clients off the network","Assigning bad IPs","Blocking DNS"],"a":1,"e":"Forged 802.11 deauthentication frames disconnect clients, often as a prelude to other attacks."},{"q":"For security, a guest wireless network should be:","o":["On the same VLAN as servers","Isolated from the internal LAN","Open with no portal","Bridged to management"],"a":1,"e":"Guest networks should be segmented/isolated so guest devices cannot reach internal resources."},{"q":"EAP (Extensible Authentication Protocol) is:","o":["An encryption cipher","An authentication framework used with 802.1X","A routing protocol","A cabling standard"],"a":1,"e":"EAP defines authentication methods (PEAP, EAP-TLS, etc.) used within 802.1X."},{"q":"A wireless heat map is used to visualize:","o":["VLAN assignments","Signal strength/coverage across an area","DNS records","Switch ports"],"a":1,"e":"Heat maps show measured or predicted RF coverage to guide AP placement and channel planning."},{"q":"Setting access-point transmit power too high can cause:","o":["Better roaming","Increased interference and poor roaming due to overlap","Stronger encryption","Fewer clients"],"a":1,"e":"Excessive power expands cells so they overlap and 'sticky' clients fail to roam, hurting performance."},{"q":"How many channels are available in the 2.4 GHz band in North America?","o":["3","11","14","24"],"a":1,"e":"North America permits channels 1–11 in 2.4 GHz (1, 6, 11 are the non-overlapping set)."},{"q":"The 5 GHz band supports wider channels such as:","o":["5 and 10 MHz","40, 80, and 160 MHz","1 MHz only","2.4 MHz"],"a":1,"e":"5 GHz (and 6 GHz) can bond into 40/80/160 MHz channels for much higher throughput."}]},
{id:"security",code:"SEC",color:"#F87171",name:"Network Security",exam:"Network+ (N10-009)",summary:"Security spans access control, traffic filtering, and threat awareness. Network+ covers ACLs and firewall behavior, VPNs and IPsec, NAC/802.1X, port security, and recognizing common attacks.",key:["<b>ACLs / firewall rules</b> are evaluated <b>top-down, first match wins</b>, with an implicit <i>deny any</i> at the end. They are applied <b>inbound</b> or <b>outbound</b> on an interface to permit or deny by IP, protocol, or port.","<b>Firewalls:</b> stateful firewalls track connection state and automatically allow return traffic; stateless filters evaluate each packet against static rules.","<b>Access control:</b> <span class='k'>802.1X</span> provides port-based network access control (NAC) using a RADIUS server; <b>port security</b> limits the MAC addresses allowed on a port.","<b>Common attacks:</b> on-path/MITM, ARP spoofing/poisoning, DNS poisoning, VLAN hopping, DoS/DDoS, and rogue DHCP — mitigated by DHCP snooping, Dynamic ARP Inspection (DAI), and network segmentation."],q:[{"q":"A standard access control list filters traffic based on what?","o":["Source IP address only","Source and destination IP and port","MAC address","Application signatures"],"a":0,"e":"Standard ACLs (1–99) match only the source IP. Extended ACLs (100–199) can match source, destination, protocol, and port numbers."},{"q":"What is the key advantage of a stateful firewall over a stateless one?","o":["It encrypts all traffic","It tracks connection state and automatically permits return traffic","It assigns IP addresses","It is faster because it ignores headers"],"a":1,"e":"A stateful firewall maintains a state table of active connections, so legitimate return traffic is allowed without an explicit rule, unlike a stateless packet filter."},{"q":"Which technology provides port-based network access control using a RADIUS authentication server?","o":["802.11ac","802.1Q","802.1X","802.3af"],"a":2,"e":"802.1X authenticates devices before granting network access at the switch port, typically validating credentials against a RADIUS server."},{"q":"An attacker sends forged ARP replies to associate their MAC with the default gateway's IP. This is known as:","o":["DNS poisoning","ARP spoofing (poisoning)","VLAN hopping","A SYN flood"],"a":1,"e":"ARP spoofing/poisoning floods the LAN with fake ARP replies so traffic is redirected through the attacker — a common on-path (MITM) technique. Dynamic ARP Inspection mitigates it."},{"q":"What appears implicitly at the end of every ACL if no match is found?","o":["permit any","deny any","log any","forward any"],"a":1,"e":"Every ACL ends with an implicit 'deny any' — if traffic matches no permit statement, it is dropped. This is why ACL ordering matters."},{"q":"Which switch feature mitigates a rogue DHCP server by trusting only specific ports?","o":["Port security","DHCP snooping","Port mirroring","Spanning Tree"],"a":1,"e":"DHCP snooping designates trusted ports (toward the legitimate server) and drops DHCP offers arriving on untrusted ports, blocking rogue DHCP servers."},{"q":"What is the typical number range for standard ACLs?","o":["1–99","100–199","200–299","1000–1099"],"a":0,"e":"Standard ACLs use 1–99 (and 1300–1999); extended ACLs use 100–199 (and 2000–2699)."},{"q":"What is the purpose of a DMZ?","o":["Store backups","Host public-facing servers isolated from the internal LAN","Encrypt VLANs","Replace a firewall"],"a":1,"e":"A DMZ is a buffer subnet for internet-facing services, isolating them from the trusted internal network."},{"q":"What is the key difference between an IDS and an IPS?","o":["IDS encrypts; IPS does not","An IPS blocks traffic inline, while an IDS only detects and alerts","They are identical","IDS routes; IPS switches"],"a":1,"e":"An IPS sits inline and can drop malicious traffic; an IDS passively monitors and raises alerts."},{"q":"At which OSI layer does IPsec primarily operate?","o":["Layer 2","Layer 3 (Network)","Layer 4","Layer 7"],"a":1,"e":"IPsec secures traffic at Layer 3, encrypting/authenticating IP packets in transit (used for site-to-site VPNs)."},{"q":"AAA stands for:","o":["Access, Audit, Allow","Authentication, Authorization, Accounting","Address, Acknowledge, Assign","Anti-virus, Anti-spam, Anti-malware"],"a":1,"e":"AAA = Authentication (who you are), Authorization (what you can do), and Accounting (what you did)."},{"q":"Compared to RADIUS, TACACS+:","o":["Uses UDP and encrypts only the password","Uses TCP (port 49), separates AAA functions, and encrypts the entire payload","Cannot do authorization","Is wireless-only"],"a":1,"e":"TACACS+ (Cisco) runs over TCP 49, separates authentication/authorization/accounting, and encrypts the whole packet."},{"q":"Dynamic ARP Inspection (DAI) mitigates which attack?","o":["DDoS","ARP spoofing/poisoning","Phishing","SQL injection"],"a":1,"e":"DAI validates ARP packets against DHCP snooping bindings, blocking forged ARP replies used in poisoning."},{"q":"VLAN hopping is best mitigated by:","o":["Enabling automatic trunk negotiation on all ports","Disabling unused ports, turning off automatic trunking, and changing the native VLAN","Using VLAN 1 for every device","Opening all switch ports"],"a":1,"e":"VLAN hopping is mitigated by disabling unused ports, turning off automatic trunk negotiation, and moving access ports off the native VLAN."},{"q":"A honeypot is:","o":["A backup server","A decoy system designed to attract and study attackers","A type of firewall","A VPN protocol"],"a":1,"e":"A honeypot lures attackers to a deliberately exposed decoy so their behavior can be observed and contained."},{"q":"A DDoS attack is characterized by:","o":["A single host scanning ports","Many compromised hosts overwhelming a target","Encrypting files for ransom","Spoofing DNS records"],"a":1,"e":"A Distributed Denial of Service uses many sources (often a botnet) to flood and overwhelm a target."},{"q":"An on-path (man-in-the-middle) attack involves:","o":["Deleting logs","Intercepting traffic between two communicating parties","Cracking Wi-Fi only","Flooding a CAM table"],"a":1,"e":"An on-path attacker secretly relays and may alter communication between two endpoints that believe they talk directly."},{"q":"Phishing is an example of which attack category?","o":["Physical","Social engineering","Cryptographic","Routing"],"a":1,"e":"Phishing manipulates people into revealing credentials or clicking malicious links — a social engineering attack."},{"q":"The principle of least privilege means:","o":["Give users admin rights to reduce tickets","Grant only the minimum access required for a role","Disable all access","Share one account"],"a":1,"e":"Least privilege limits each user/process to only the permissions necessary, reducing the attack surface."},{"q":"A next-generation firewall (NGFW) typically adds which capability over a traditional firewall?","o":["Only NAT","Application awareness, deep packet inspection, and integrated IPS","DHCP serving","VLAN tagging"],"a":1,"e":"NGFWs inspect application-layer traffic, identify apps/users, and bundle IPS and threat intelligence."},{"q":"Which is a valid Cisco switchport port-security violation mode?","o":["Forward","Shutdown","Encrypt","Trunk"],"a":1,"e":"Port-security violation modes are protect, restrict, and shutdown (the default err-disables the port)."},{"q":"In an 802.1X deployment, the device requesting access is called the:","o":["Authenticator","Supplicant","Authentication server","Relay agent"],"a":1,"e":"The supplicant requests access; the switch is the authenticator; RADIUS is the authentication server."},{"q":"What does 'defense in depth' describe?","o":["One strong firewall","Multiple layered security controls so no single failure is catastrophic","Encrypting only email","Physical security only"],"a":1,"e":"Defense in depth layers overlapping controls (network, host, app, physical) so a single breach is contained."},{"q":"A stateless packet filter differs from a stateful firewall because it:","o":["Tracks every connection","Evaluates each packet independently against static rules","Encrypts traffic","Performs DNS"],"a":1,"e":"A stateless filter judges packets in isolation with no awareness of connection state, unlike a stateful firewall."},{"q":"DHCP snooping protects against rogue DHCP servers by:","o":["Encrypting leases","Trusting DHCP offers only from designated trusted ports","Disabling DHCP","Assigning static IPs"],"a":1,"e":"DHCP snooping marks uplink ports as trusted and drops server-type DHCP messages arriving on untrusted ports."},{"q":"How are ACL entries processed?","o":["Bottom-up, last match wins","Top-down, first match wins","Randomly","By lowest port first"],"a":1,"e":"ACLs are evaluated top-down and stop at the first match, so statement order matters."},{"q":"A 'zero trust' security model assumes:","o":["Internal traffic is always safe","No implicit trust; every request is verified","Firewalls are unnecessary","Encryption is optional"],"a":1,"e":"Zero trust treats every user/device/request as untrusted until verified, regardless of network location."},{"q":"Multi-factor authentication (MFA) requires:","o":["Two passwords","Two or more different factor types","A longer password","A single token"],"a":1,"e":"MFA combines factors from different categories: something you know, have, and/or are."},{"q":"In IPsec, the ESP protocol provides:","o":["Only authentication","Encryption (and optional authentication) of the payload","Routing","Compression only"],"a":1,"e":"Encapsulating Security Payload (ESP) encrypts the packet payload and can also authenticate it."},{"q":"In IPsec, the AH protocol provides:","o":["Encryption only","Authentication and integrity without encryption","NAT","Tunneling only"],"a":1,"e":"Authentication Header (AH) ensures integrity and authenticity but does not encrypt the data."},{"q":"IKE (Internet Key Exchange) is used in IPsec to:","o":["Encrypt DNS","Negotiate security associations and exchange keys","Route packets","Assign IP addresses"],"a":1,"e":"IKE establishes the SAs and keying material that IPsec uses to protect traffic."},{"q":"A site-to-site VPN connects:","o":["A single laptop to a server","Two networks/gateways across an untrusted network","Two switches on one LAN","A printer to a PC"],"a":1,"e":"Site-to-site VPNs link entire networks via gateway-to-gateway encrypted tunnels."},{"q":"A remote-access (client) VPN connects:","o":["Two data centers","An individual user device to a corporate network","Two ISPs","Two VLANs"],"a":1,"e":"Remote-access VPNs let individual users securely reach the network from anywhere."},{"q":"Symmetric encryption uses:","o":["A public/private key pair","A single shared secret key for encryption and decryption","No key","A hash only"],"a":1,"e":"Symmetric algorithms like AES use one shared key for both operations and are fast."},{"q":"Asymmetric encryption uses:","o":["One shared key","A mathematically linked public/private key pair","A MAC address","A salt only"],"a":1,"e":"Asymmetric algorithms (e.g., RSA) use a public key to encrypt and a private key to decrypt."},{"q":"A digital certificate binds:","o":["Two IP addresses","A public key to an identity, signed by a CA","A MAC to a port","A VLAN to a subnet"],"a":1,"e":"A certificate ties a public key to a verified identity, vouched for by a Certificate Authority."},{"q":"A cryptographic hash such as SHA-256 provides:","o":["Confidentiality","Integrity via a one-way fixed-length digest","Routing","Compression"],"a":1,"e":"Hashing verifies integrity: any change to the input produces a different, fixed-length digest."},{"q":"A SYN flood attack works by:","o":["Encrypting files","Sending many half-open TCP connections to exhaust server resources","Spoofing ARP","Poisoning DNS"],"a":1,"e":"A SYN flood opens many connections that never complete, filling the server's connection table."},{"q":"MAC spoofing is the act of:","o":["Encrypting frames","Changing a device's MAC to impersonate another","Flooding DNS","Tagging VLANs"],"a":1,"e":"An attacker alters their NIC's MAC address to bypass filters or impersonate a trusted device."},{"q":"A rogue access point is:","o":["A WLC","An unauthorized AP connected to the network","A firewall","A managed AP"],"a":1,"e":"A rogue AP is an unsanctioned access point that creates an uncontrolled entry into the network."},{"q":"Network segmentation improves security primarily by:","o":["Increasing broadcast domains for fun","Limiting lateral movement and containing breaches","Removing the need for firewalls","Encrypting all data"],"a":1,"e":"Dividing the network into segments restricts how far an attacker or malware can spread."},{"q":"An ACL applied 'inbound' on an interface filters traffic:","o":["As it leaves the interface","As it enters the interface","Only on trunks","Only broadcasts"],"a":1,"e":"An inbound ACL evaluates packets arriving on the interface before they are routed."},{"q":"Geofencing restricts access based on:","o":["Time of day","Physical/geographic location","Password length","MAC vendor"],"a":1,"e":"Geofencing grants or denies access depending on the device's physical location."},{"q":"A jump box (bastion host) is used to:","o":["Store backups","Provide a hardened, monitored entry point to access internal systems","Route between VLANs","Serve DNS"],"a":1,"e":"A jump box is a controlled intermediary used to administer internal systems from a less-trusted zone."},{"q":"Port-security 'sticky' MAC addresses:","o":["Are never saved","Are dynamically learned and saved to the running configuration","Block all MACs","Disable the port"],"a":1,"e":"Sticky learning records the first MAC(s) seen and writes them to config, simplifying static port security."},{"q":"A SIEM system is used for:","o":["Routing packets","Centralized log collection, correlation, and alerting","Assigning IPs","Encrypting disks"],"a":1,"e":"Security Information and Event Management aggregates and analyzes logs to detect and alert on threats."},{"q":"A Network Access Control (NAC) solution typically:","o":["Encrypts WAN links","Checks device identity/posture before granting network access","Replaces DNS","Tags VLANs only"],"a":1,"e":"NAC enforces policy (identity, health checks) on devices before allowing them onto the network."},{"q":"Role-based access control (RBAC) grants permissions based on:","o":["A device's MAC address","A user's job role or function","The time of day only","Random assignment"],"a":1,"e":"RBAC assigns rights to roles, and users inherit them by role, simplifying least-privilege management."},{"q":"Separation of duties is a control that:","o":["Lets one admin do everything","Splits critical tasks among multiple people to reduce fraud and error","Disables logging","Encrypts data at rest"],"a":1,"e":"By requiring more than one person for sensitive actions, separation of duties limits abuse and mistakes."},{"q":"Content (URL) filtering is used to:","o":["Encrypt web traffic","Block access to disallowed websites or categories","Assign IP addresses","Aggregate links"],"a":1,"e":"Content filters enforce acceptable-use policy by blocking categories or specific sites."}]},
{id:"physical",code:"PHY",color:"#FBBF24",name:"Cabling, Media & Topologies",exam:"Network+ (N10-009)",summary:"The physical layer determines speed, distance, and reliability. Network+ in particular tests copper categories, fiber types, connector standards, and topology trade-offs.",key:["<b>Copper categories:</b> Cat5e (1 Gbps/100m), Cat6 (1 Gbps/100m; 10 Gbps to 55m), Cat6a (10 Gbps/100m), Cat8 (25–40 Gbps, short data-center runs).","<b>Fiber:</b> <b>Single-mode (SMF)</b> = laser, long distance (km), yellow jacket. <b>Multimode (MMF)</b> = LED/VCSEL, shorter distance, aqua/orange.","<b>Termination:</b> T568A vs T568B pinouts. A straight-through cable connects unlike devices; a crossover connects like devices (largely automated now by Auto-MDIX).","<b>Topologies:</b> star (most common, switch-centric), mesh (most redundant), bus/ring (legacy). A <b>full mesh</b> of n nodes needs n(n−1)/2 links."],q:[{"q":"Which copper cabling category supports 10 Gbps over the full 100-meter distance?","o":["Cat5e","Cat6","Cat6a","Cat3"],"a":2,"e":"Cat6a supports 10GBASE-T to 100m. Plain Cat6 only reaches 10 Gbps at about 55m; Cat5e tops out at 1 Gbps."},{"q":"For a 10 km link between two buildings, which media is appropriate?","o":["Cat6a UTP","Single-mode fiber","Multimode fiber","Coaxial cable"],"a":1,"e":"Single-mode fiber uses a laser and a tiny core to carry signals many kilometers. Multimode is limited to a few hundred meters, and copper to ~100m."},{"q":"Which network topology provides the highest redundancy, with every node connected to every other node?","o":["Star","Bus","Full mesh","Ring"],"a":2,"e":"In a full mesh every device links to every other device, so any single link failure has an alternate path. The cost is many cables: n(n−1)/2 connections."},{"q":"A straight-through Ethernet cable is normally used to connect:","o":["A switch to another switch","A PC to a switch","A router to another router","Two PCs directly"],"a":1,"e":"Straight-through cables connect unlike devices (PC↔switch, switch↔router). Like devices traditionally used a crossover, though Auto-MDIX now handles this automatically."},{"q":"What distinguishes single-mode fiber from multimode fiber?","o":["Single-mode uses LEDs over short distances","Single-mode uses a laser and supports much longer distances","Multimode carries 10x more data over any distance","They are electrically identical"],"a":1,"e":"Single-mode has a very small core and uses laser light for long-haul runs (kilometers). Multimode has a larger core, uses LED/VCSEL sources, and is for shorter distances."},{"q":"Which topology is most common in modern LANs, with all devices connecting back to a central switch?","o":["Ring","Bus","Star","Mesh"],"a":2,"e":"The star topology centers on a switch (or hub historically). It's easy to troubleshoot and a single cable failure affects only one node."},{"q":"What is the maximum supported speed of Cat5e cabling?","o":["100 Mbps","1 Gbps","10 Gbps","40 Gbps"],"a":1,"e":"Cat5e supports 1 Gbps (1000BASE-T) over 100 meters."},{"q":"Cat6 supports 10 Gigabit Ethernet over approximately what distance?","o":["100 m","55 m","305 m","10 m"],"a":1,"e":"Cat6 handles 10 Gbps only to about 55 m; Cat6a extends 10 Gbps to the full 100 m."},{"q":"What is the maximum recommended run length for copper twisted-pair Ethernet?","o":["50 m","100 m","185 m","305 m"],"a":1,"e":"TIA standards limit UTP Ethernet runs to 100 meters (about 90 m of horizontal cable plus patch cords)."},{"q":"Which cabling category targets 25–40 Gbps over short data-center runs?","o":["Cat5e","Cat6","Cat6a","Cat8"],"a":3,"e":"Cat8 supports 25/40GBASE-T over short distances (about 30 m), typical of data-center switch-to-server links."},{"q":"Which connector is standard for twisted-pair Ethernet?","o":["RJ11","RJ45","LC","BNC"],"a":1,"e":"RJ45 (8P8C) is the standard modular connector for twisted-pair Ethernet."},{"q":"Which of the following is a fiber-optic connector?","o":["RJ45","LC","RJ11","DB9"],"a":1,"e":"LC, SC, and ST are fiber connectors; LC is a popular small-form-factor type. RJ45/RJ11 are copper."},{"q":"T568A and T568B define:","o":["Fiber polishing types","Twisted-pair wiring pinout standards","VLAN tags","PoE classes"],"a":1,"e":"T568A/T568B specify the wire-to-pin order in RJ45 terminations; consistency matters within a run."},{"q":"A crossover cable is traditionally used to connect:","o":["A PC to a switch","Two like devices such as switch-to-switch","A router to a modem","A phone to a wall jack"],"a":1,"e":"Crossover cables connect similar devices (switch-switch, PC-PC), though Auto-MDIX now adjusts automatically."},{"q":"Plenum-rated cable is required when:","o":["Running underground","Installed in air-handling spaces for fire/smoke safety","Used outdoors only","Connecting fiber"],"a":1,"e":"Plenum cable has a fire-resistant, low-smoke jacket required in plenum air spaces by building codes."},{"q":"Multimode fiber typically uses which light source?","o":["High-power laser","LED or VCSEL","Sunlight","Copper signaling"],"a":1,"e":"Multimode fiber commonly uses LEDs or VCSELs for shorter-distance links; single-mode uses lasers."},{"q":"Which topology relies on a single shared backbone where one break can disrupt all hosts?","o":["Star","Bus","Mesh","Hybrid"],"a":1,"e":"In a bus topology all devices share one cable; a backbone fault or termination problem affects everyone."},{"q":"A hybrid topology is best described as:","o":["A single ring","A combination of two or more basic topologies","Wireless only","A point-to-point link"],"a":1,"e":"Hybrid topologies mix types — for example a star-bus or star-ring — to balance cost and resilience."},{"q":"The demarcation point (demarc) marks:","o":["The core switch","The boundary between the provider's network and the customer's","The DNS root","The firewall DMZ"],"a":1,"e":"The demarc is where the service provider's responsibility ends and the customer's wiring begins."},{"q":"What is the function of a patch panel?","o":["Route between VLANs","Terminate and organize cable runs for easy patching","Provide PoE","Filter traffic"],"a":1,"e":"A patch panel terminates permanent cable runs so they can be cross-connected with short patch cables."},{"q":"Attenuation refers to:","o":["Signal interference from adjacent wires","Loss of signal strength over distance","Excessive bandwidth","Duplex mismatch"],"a":1,"e":"Attenuation is the weakening of a signal as it travels along the medium, worsening with distance."},{"q":"Crosstalk is:","o":["Loss over distance","Interference induced between adjacent conductors","A fiber-only issue","A routing loop"],"a":1,"e":"Crosstalk is unwanted coupling of a signal from one wire pair into another, degrading the signal."},{"q":"PoE standards 802.3af / 802.3at / 802.3bt primarily deliver:","o":["Faster data only","Electrical power over the Ethernet cable","VLAN tagging","Fiber light"],"a":1,"e":"Power over Ethernet supplies power to devices (APs, phones, cameras): ~15.4 W (af), 30 W (at), up to ~90 W (bt)."},{"q":"A major advantage of fiber-optic cabling over copper is:","o":["Lower cost","Immunity to electromagnetic interference (EMI)","Easier termination","It carries electricity"],"a":1,"e":"Fiber transmits light, so it is immune to EMI/RFI and supports far greater distances and bandwidth."},{"q":"In a full-mesh network of n nodes, how many links are required?","o":["n","n − 1","n(n − 1)/2","2n"],"a":2,"e":"A full mesh connects every node to every other node, requiring n(n − 1)/2 links."},{"q":"Single-mode fiber is generally preferred when you need:","o":["Cheap short in-building runs","Long-distance, high-bandwidth transmission","To carry electrical power","To avoid connectors"],"a":1,"e":"Single-mode's tiny core and laser source support long-haul (kilometer-scale) links; multimode suits shorter runs."},{"q":"1000BASE-T Gigabit Ethernet runs over which media?","o":["Multimode fiber","Four pairs of Cat5e/Cat6 copper","Coaxial cable","Single-mode fiber"],"a":1,"e":"1000BASE-T uses all four pairs of twisted-pair copper (Cat5e or better) to 100 m."},{"q":"10GBASE-T over the full 100 meters requires at least which cabling?","o":["Cat5e","Cat6","Cat6a","Cat3"],"a":2,"e":"Cat6a is required for 10GBASE-T at 100 m; Cat6 reaches only ~55 m at 10 Gbps."},{"q":"The 1000BASE-SX standard uses which media?","o":["Single-mode fiber","Multimode fiber","Cat5e copper","Coax"],"a":1,"e":"1000BASE-SX is a short-wavelength Gigabit standard that runs over multimode fiber."},{"q":"The 1000BASE-LX standard primarily uses:","o":["Multimode only","Single-mode (long-wavelength) fiber","Copper","Coax"],"a":1,"e":"1000BASE-LX uses long-wavelength optics over single-mode fiber (and some MMF) for longer runs."},{"q":"A media converter is used to:","o":["Route between subnets","Convert between media types such as copper and fiber","Assign VLANs","Provide DHCP"],"a":1,"e":"Media converters bridge different physical media, e.g., extending a copper segment onto fiber."},{"q":"An SFP/SFP+ is best described as:","o":["A routing protocol","A hot-swappable transceiver module for switch/router uplinks","A cable category","A firewall rule"],"a":1,"e":"SFP modules let you choose copper or fiber optics for a port and swap them without downtime."},{"q":"An RJ45 connector has how many pins?","o":["4","6","8","12"],"a":2,"e":"RJ45 (8P8C) has 8 pins for the four twisted pairs."},{"q":"A category-rated UTP Ethernet cable contains how many wire pairs?","o":["2","3","4","8"],"a":2,"e":"Standard UTP for Ethernet has 4 pairs (8 conductors)."},{"q":"A cable wired T568B on both ends is a:","o":["Crossover cable","Straight-through cable","Rollover cable","Loopback cable"],"a":1,"e":"Identical standards on both ends (B-B or A-A) make a straight-through cable."},{"q":"Auto-MDIX on a switch port allows it to:","o":["Assign IP addresses","Automatically detect and adjust for straight-through or crossover cabling","Tag VLANs","Provide PoE"],"a":1,"e":"Auto-MDIX senses the cable type and swaps transmit/receive pairs as needed, so cable choice rarely matters."},{"q":"Which connector type is standard for cable-internet coaxial connections?","o":["BNC","F-type","LC","RJ11"],"a":1,"e":"Residential cable internet uses screw-on F-type connectors on RG-6 coax."},{"q":"Compared with RG-59, RG-6 coaxial cable is preferred for:","o":["Short patch cords only","Longer runs and higher frequencies (cable/satellite)","Fiber links","Telephone wiring"],"a":1,"e":"RG-6 has lower loss at high frequencies, making it better for longer cable/satellite runs."},{"q":"Shielded twisted pair (STP) is used primarily to:","o":["Increase length beyond 100 m","Reduce electromagnetic interference in noisy environments","Carry power","Replace fiber"],"a":1,"e":"The shielding in STP helps reject EMI/RFI where interference would degrade UTP."},{"q":"The twisting of pairs in twisted-pair cable primarily reduces:","o":["Attenuation","Crosstalk and EMI","Cost","Bandwidth"],"a":1,"e":"Twisting cancels out interference between pairs; tighter twists reduce crosstalk."},{"q":"Which is a common source of EMI affecting copper cabling?","o":["Sunlight","Electric motors and fluorescent lighting","Fiber cables","DNS servers"],"a":1,"e":"Motors, fluorescent ballasts, and power lines emit EMI that can corrupt copper signals."},{"q":"A rollover (console) cable is used to connect:","o":["Two switches","A PC's serial/USB port to a device's console port","A router to the internet","Two PCs for file sharing"],"a":1,"e":"Rollover cables connect a management workstation to a device console for CLI access."},{"q":"APC (angled physical contact) fiber connectors differ from UPC by:","o":["Being copper","Using an angled, polished ferrule (green) for lower back-reflection","Carrying power","Being multimode only"],"a":1,"e":"APC's 8-degree angled endface reduces return loss and is identified by a green connector body."},{"q":"Multimode fiber typically has a core diameter of:","o":["About 9 mi
